<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Australian Emergency Response</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: white;
            overflow: hidden;
        }

        .container {
            text-align: center;
            max-width: 500px;
            width: 90%;
        }

        .header {
            margin-bottom: 50px;
        }

        .game-title {
            font-size: 2.5rem;
            font-weight: bold;
            margin-bottom: 10px;
            color: #333;
        }

        .game-subtitle {
            font-size: 1rem;
            color: #666;
        }

        .auth-container {
            display: flex;
            gap: 20px;
            margin-top: 40px;
            flex-direction: column;
        }

        .auth-section {
            border: 1px solid #ddd;
            padding: 30px;
            border-radius: 8px;
            background: #f9f9f9;
        }

        .auth-section h2 {
            font-size: 1.3rem;
            margin-bottom: 20px;
            color: #333;
        }

        .form-group {
            margin-bottom: 15px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #333;
            font-size: 0.9rem;
        }

        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 1rem;
        }

        .form-group input:focus {
            outline: none;
            border-color: #0066cc;
            box-shadow: 0 0 5px rgba(0, 102, 204, 0.3);
        }

        .button {
            width: 100%;
            padding: 12px;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .button-primary {
            background: #0066cc;
            color: white;
        }

        .button-primary:hover {
            background: #0052a3;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0, 102, 204, 0.3);
        }

        .button-primary:active {
            transform: translateY(0);
        }

        .error-message {
            color: #d32f2f;
            font-size: 0.9rem;
            margin-top: 10px;
            display: none;
        }

        .success-message {
            color: #388e3c;
            font-size: 0.9rem;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 class="game-title">Australian Emergency Response</h1>
            <p class="game-subtitle">EST 2026</p>
        </div>

        <div class="auth-container">
            <!-- Login Section -->
            <div class="auth-section">
                <h2>Login</h2>
                <form id="loginForm">
                    <div class="form-group">
                        <label for="loginUsername">Username</label>
                        <input type="text" id="loginUsername" required>
                    </div>
                    <div class="form-group">
                        <label for="loginPassword">Password</label>
                        <input type="password" id="loginPassword" required>
                    </div>
                    <button type="submit" class="button button-primary">Login</button>
                    <div id="loginError" class="error-message"></div>
                </form>
            </div>

            <!-- Create Account Section -->
            <div class="auth-section">
                <h2>Create Account</h2>
                <form id="createAccountForm">
                    <div class="form-group">
                        <label for="createUsername">Username</label>
                        <input type="text" id="createUsername" required>
                    </div>
                    <div class="form-group">
                        <label for="createPassword">Password</label>
                        <input type="password" id="createPassword" required>
                    </div>
                    <button type="submit" class="button button-primary">Create Account</button>
                    <div id="createError" class="error-message"></div>
                    <div id="createSuccess" class="success-message"></div>
                </form>
            </div>
        </div>
    </div>

    <script>
        // Login form handler
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            const errorDiv = document.getElementById('loginError');

            if (username && password) {
                // Check if user exists in localStorage
                const users = JSON.parse(localStorage.getItem('users')) || {};
                if (users[username] && users[username] === password) {
                    // Successful login
                    localStorage.setItem('currentUser', username);
                    window.location.href = 'map.html';
                } else {
                    errorDiv.textContent = 'Invalid username or password';
                    errorDiv.style.display = 'block';
                }
            }
        });

        // Create account form handler
        document.getElementById('createAccountForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('createUsername').value;
            const password = document.getElementById('createPassword').value;
            const errorDiv = document.getElementById('createError');
            const successDiv = document.getElementById('createSuccess');

            if (username && password) {
                const users = JSON.parse(localStorage.getItem('users')) || {};
                
                if (users[username]) {
                    errorDiv.textContent = 'Username already exists';
                    errorDiv.style.display = 'block';
                    successDiv.style.display = 'none';
                } else {
                    // Create new account
                    users[username] = password;
                    localStorage.setItem('users', JSON.stringify(users));
                    localStorage.setItem('currentUser', username);
                    
                    successDiv.textContent = 'Account created successfully! Redirecting...';
                    successDiv.style.display = 'block';
                    errorDiv.style.display = 'none';
                    
                    setTimeout(() => {
                        window.location.href = 'map.html';
                    }, 1500);
                }
            }
        });
    </script>
</body>
</html>
