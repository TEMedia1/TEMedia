<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tasmanian Emergency Media</title>

<style>
body{
    font-family:Arial;
    background:#111;
    color:white;
    margin:0;
}

header{
    background:red;
    padding:15px;
    text-align:center;
}

.feed{
    max-width:800px;
    margin:auto;
    padding:20px;
}

.card{
    background:#222;
    padding:15px;
    margin-bottom:15px;
    border-radius:10px;
}

.emergency{
    border-left:5px solid red;
    background:#2a0000;
}

img{
    width:100%;
    border-radius:8px;
    margin-top:10px;
}

.meta{
    font-size:12px;
    color:#aaa;
}
.badge{
    background:red;
    padding:3px 8px;
    font-size:12px;
    border-radius:5px;
    display:inline-block;
    margin-bottom:5px;
}
</style>
</head>

<body>

<header>
<h1>Tasmanian Emergency Media</h1>
</header>

<div class="feed" id="feed"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getFirestore,
collection,
query,
orderBy,
onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAIqLic00FcNgtuKZATMdHU4jRITnYO2A8",
  authDomain: "temedia20-be031.firebaseapp.com",
  projectId: "temedia20-be031",
  storageBucket: "temedia20-be031.firebasestorage.app",
  messagingSenderId: "514394139848",
  appId: "1:514394139848:web:7edabb080c12b87bc909fd"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const feed = document.getElementById("feed");

function timeFormat(t){
    if(!t) return "";
    const d = new Date(t);
    return d.toLocaleString();
}

const q = query(collection(db,"posts"), orderBy("time","desc"));

onSnapshot(q,(snap)=>{
    feed.innerHTML = "";

    snap.forEach((doc)=>{
        const d = doc.data();

        feed.innerHTML += `
        <div class="card ${d.emergency ? "emergency":""}">
            ${d.emergency ? "<div class='badge'>EMERGENCY</div>" : ""}
            
            <h2>${d.title}</h2>
            <p>${d.desc}</p>

            ${d.location ? `<p class="meta">📍 ${d.location}</p>` : ""}
            ${d.category ? `<p class="meta">🚨 ${d.category}</p>` : ""}

            ${d.image ? `<img src="${d.image}">` : ""}

            <p class="meta">${timeFormat(d.time)}</p>
        </div>
        `;
    });
});

</script>

</body>
</html>
