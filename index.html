<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Australian Emergency Service - Loading</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f5f5f5;
            overflow: hidden;
        }

        .loading-container {
            text-align: center;
            max-width: 600px;
        }

        .game-title {
            font-size: 2.5rem;
            font-weight: bold;
            margin-bottom: 30px;
            color: #333;
        }

        .game-subtitle {
            font-size: 1.1rem;
            margin-bottom: 40px;
            color: #666;
        }

        .emergency-services {
            display: flex;
            justify-content: space-around;
            margin-bottom: 60px;
            gap: 20px;
        }

        .service-icon {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .icon-box {
            width: 80px;
            height: 80px;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.5rem;
            background: #e0e0e0;
            border: 1px solid #ccc;
        }

        .service-label {
            font-size: 0.9rem;
            color: #666;
        }

        .loading-bar-container {
            width: 100%;
            height: 8px;
            background: #ddd;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .loading-bar {
            height: 100%;
            background: #4CAF50;
            width: 0;
            animation: loading 3s ease-in-out forwards;
        }

        @keyframes loading {
            0% { width: 0; }
            100% { width: 100%; }
        }

        .loading-text {
            font-size: 0.9rem;
            color: #666;
            margin-top: 10px;
        }

        .dot {
            display: inline-block;
            animation: blink 1.4s infinite;
        }

        .dot:nth-child(1) { animation-delay: 0s; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes blink {
            0%, 60%, 100% { opacity: 0.3; }
            30% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="loading-container">
        <h1 class="game-title">Australian Emergency Service</h1>
        <p class="game-subtitle">Emergency Management Simulator</p>

        <div class="emergency-services">
            <div class="service-icon">
                <div class="icon-box">🚒</div>
                <div class="service-label">Fire</div>
            </div>
            <div class="service-icon">
                <div class="icon-box">🚓</div>
                <div class="service-label">Police</div>
            </div>
            <div class="service-icon">
                <div class="icon-box">🚑</div>
                <div class="service-label">Ambulance</div>
            </div>
            <div class="service-icon">
                <div class="icon-box">🛟</div>
                <div class="service-label">SES</div>
            </div>
        </div>

        <div class="loading-bar-container">
            <div class="loading-bar"></div>
        </div>

        <p class="loading-text">
            Loading<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span>
        </p>
    </div>

    <script>
        // Redirect to map.html after 3 seconds (when loading animation completes)
        setTimeout(() => {
            window.location.href = 'map.html';
        }, 3000);
    </script>
</body>
</html>
