<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tasmanian Emergency Media</title>

<style>

body{
    font-family:Arial,sans-serif;
    margin:40px;
}

.post{
    max-width:800px;
    margin:auto;
}

img{
    max-width:100%;
    margin-top:20px;
}

.floating-btn{
    position:fixed;
    bottom:20px;
    right:20px;
    width:60px;
    height:60px;
    border:none;
    border-radius:50%;
    font-size:35px;
    cursor:pointer;
}

.admin{
    display:none;
    position:fixed;
    bottom:90px;
    right:20px;
    background:white;
    border:1px solid black;
    padding:20px;
    width:300px;
}

.admin input,
.admin textarea{
    width:100%;
    margin-bottom:10px;
    padding:8px;
}

.admin button{
    width:100%;
    padding:10px;
}

</style>

</head>

<body>

<div class="post">

<h1 id="title">Latest Media</h1>

<p id="desc">No updates yet.</p>

<img id="image">

</div>

<button class="floating-btn" onclick="openAdmin()">+</button>

<div class="admin" id="adminPanel">

<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>

<div id="editor" style="display:none;">

<input type="text" id="newTitle" placeholder="Title">

<textarea id="newDesc" placeholder="Description"></textarea>

<input type="text" id="newImage" placeholder="Image URL">

<button onclick="updatePost()">Post</button>

</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
doc,
setDoc,
getDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
    
  apiKey: "AIzaSyBQ-dRGRRLNE0YmuKov05mY54oWCSzp3zY",
  authDomain: "temedia1000.firebaseapp.com",
  projectId: "temedia1000",
  storageBucket: "temedia1000.firebasestorage.app",
  messagingSenderId: "534982245676",
  appId: "1:534982245676:web:a4fdc146c2adf843e08089",
  measurementId: "G-E8SF3826KN"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

window.openAdmin = function(){

    document.getElementById("adminPanel").style.display = "block";

}

window.login = function(){

    let pass =
    document.getElementById("password").value;

    let secret =
    ["G","H","5","5","3","2"].join("");

    if(pass === secret){

        document.getElementById("editor").style.display = "block";

    } else {

        alert("Wrong password");

    }

}

window.updatePost = async function(){

    let title =
    document.getElementById("newTitle").value;

    let desc =
    document.getElementById("newDesc").value;

    let image =
    document.getElementById("newImage").value;

    await setDoc(doc(db, "posts", "latest"), {

        title:title,
        desc:desc,
        image:image

    });

    loadPost();

}

async function loadPost(){

    const docRef = doc(db, "posts", "latest");

    const docSnap = await getDoc(docRef);

    if(docSnap.exists()){

        const data = docSnap.data();

        document.getElementById("title").innerText =
        data.title;

        document.getElementById("desc").innerText =
        data.desc;

        document.getElementById("image").src =
        data.image;

    }

}

loadPost();

</script>

</body>
</html>
