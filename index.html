<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tasmanian Emergency Media</title>

<style>
body{
    font-family:Arial,sans-serif;
    margin:40px;
    background:#111;
    color:white;
}

.post{
    max-width:800px;
    margin:auto;
}

/* each update box */
.card{
    background:#222;
    padding:15px;
    margin-bottom:15px;
    border-radius:10px;
}

img{
    max-width:100%;
    margin-top:10px;
    border-radius:8px;
}

.time{
    font-size:12px;
    color:#aaa;
    margin-top:5px;
}
</style>
</head>

<body>

<div class="post">
<h1>Tasmanian Emergency Media</h1>

<div id="feed"></div>
</div>

<button class="floating-btn" onclick="openAdmin()">+</button>

<div class="admin" id="adminPanel" style="display:none; position:fixed; bottom:90px; right:20px; background:white; color:black; padding:20px; width:300px;">
<input type="password" id="password" placeholder="Password">
<button onclick="login()">Login</button>

<div id="editor" style="display:none;">
<input type="text" id="newTitle" placeholder="Title">
<textarea id="newDesc" placeholder="Description"></textarea>
<input type="text" id="newImage" placeholder="Image URL (optional)">
<button onclick="updatePost()">Post</button>
</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getFirestore,
collection,
addDoc,
onSnapshot,
query,
orderBy
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAIqLic00FcNgtuKZATMdHU4jRITnYO2A8",
  authDomain: "temedia20-be031.firebaseapp.com",
  projectId: "temedia20-be031",
  storageBucket: "temedia20-be031.firebasestorage.app",
  messagingSenderId: "514394139848",
  appId: "1:514394139848:web:7edabb080c12b87bc909fd"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const feed = document.getElementById("feed");

/* timestamp helper */
function timeAgo(t){
    if(!t) return "";
    let s = Math.floor((Date.now() - t)/1000);

    if(s < 60) return "just now";
    if(s < 3600) return Math.floor(s/60)+" min ago";
    if(s < 86400) return Math.floor(s/3600)+" hours ago";
    return Math.floor(s/86400)+" days ago";
}

/* LIVE FEED */
const q = query(collection(db, "posts"), orderBy("time", "desc"));

onSnapshot(q, (snapshot)=>{
    feed.innerHTML = "";

    snapshot.forEach((doc)=>{
        const d = doc.data();

        feed.innerHTML += `
        <div class="card">
            <h2>${d.title || ""}</h2>
            <p>${d.desc || ""}</p>

            ${d.image ? `<img src="${d.image}">` : ""}

            <div class="time">${timeAgo(d.time)}</div>
        </div>
        `;
    });
});

/* admin UI */
window.openAdmin = function(){
    document.getElementById("adminPanel").style.display = "block";
}

window.login = function(){
    let pass = document.getElementById("password").value;
    let secret = ["G","H","5","5","3","2"].join("");

    if(pass === secret){
        document.getElementById("editor").style.display = "block";
    } else {
        alert("Wrong password");
    }
}

/* POST NEW UPDATE */
window.updatePost = async function(){

    const title = document.getElementById("newTitle").value;
    const desc = document.getElementById("newDesc").value;
    const image = document.getElementById("newImage").value;

    await addDoc(collection(db,"posts"),{
        title,
        desc,
        image,
        time: Date.now()
    });

    alert("Posted!");

    document.getElementById("newTitle").value = "";
    document.getElementById("newDesc").value = "";
    document.getElementById("newImage").value = "";
}

</script>

</body>
</html>
