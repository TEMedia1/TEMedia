<script>

function openAdmin(){
    document.getElementById("adminPanel").style.display = "block";
}

function login(){

    let pass = document.getElementById("password").value;

    let secret = ["G","H","5","5","3","2"].join("");

    if(pass === secret){

        document.getElementById("editor").style.display = "block";

    } else {

        alert("Wrong password");

    }

}

function updatePost(){

    let title =
    document.getElementById("newTitle").value;

    let desc =
    document.getElementById("newDesc").value;

    document.getElementById("title").innerText = title;

    document.getElementById("desc").innerText = desc;

    localStorage.setItem("savedTitle", title);
    localStorage.setItem("savedDesc", desc);

    let file = document.getElementById("newImage").files[0];

    if(file){

        let reader = new FileReader();

        reader.onload = function(e){

            let imageData = e.target.result;

            document.getElementById("image").src = imageData;

            localStorage.setItem("savedImage", imageData);

        }

        reader.readAsDataURL(file);

    }

}

window.onload = function(){

    let savedTitle = localStorage.getItem("savedTitle");
    let savedDesc = localStorage.getItem("savedDesc");
    let savedImage = localStorage.getItem("savedImage");

    if(savedTitle){
        document.getElementById("title").innerText = savedTitle;
    }

    if(savedDesc){
        document.getElementById("desc").innerText = savedDesc;
    }

    if(savedImage){
        document.getElementById("image").src = savedImage;
    }

}

</script>
