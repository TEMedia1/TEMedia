<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tasmanian Emergency Media</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#111;
    color:white;
    margin:0;
}

header{
    background:red;
    padding:15px;
    text-align:center;
}

.post{
    max-width:700px;
    margin:20px auto;
    background:#222;
    padding:20px;
    border-radius:10px;
}

.time{
    font-size:12px;
    color:#aaa;
}
</style>
</head>

<body>

<header>
<h1>Tasmanian Emergency Media</h1>
</header>

<div class="post">
<h2 id="title">No updates yet</h2>
<p id="desc"></p>
<p class="time" id="time"></p>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getFirestore,
doc,
onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAIqLic00FcNgtuKZATMdHU4jRITnYO2A8",
  authDomain: "temedia20-be031.firebaseapp.com",
  projectId: "temedia20-be031",
  storageBucket: "temedia20-be031.firebasestorage.app",
  messagingSenderId: "514394139848",
  appId: "1:514394139848:web:7edabb080c12b87bc909fd"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const docRef = doc(db, "posts", "latest");

function timeAgo(t){
    if(!t) return "";
    let s = Math.floor((Date.now() - t)/1000);
    if(s < 60) return "just now";
    if(s < 3600) return Math.floor(s/60)+" min ago";
    if(s < 86400) return Math.floor(s/3600)+" hours ago";
    return Math.floor(s/86400)+" days ago";
}

onSnapshot(docRef, (snap)=>{
    if(snap.exists()){
        const d = snap.data();

        document.getElementById("title").innerText = d.title || "";
        document.getElementById("desc").innerText = d.desc || "";
        document.getElementById("time").innerText = timeAgo(d.time);
    }
});

</script>

</body>
</html>
