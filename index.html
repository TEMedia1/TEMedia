<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Australian Emergency Response</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
            overflow: hidden;
            position: relative;
        }

        /* GTA-style flashing background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, #ff0000, #0000ff, #ff0000, #0000ff);
            background-size: 400% 400%;
            opacity: 0.3;
            animation: policeFlash 0.5s infinite;
            pointer-events: none;
            z-index: 1;
        }

        @keyframes policeFlash {
            0% {
                background-position: 0% 50%;
                opacity: 0.3;
            }
            50% {
                background-position: 100% 50%;
                opacity: 0.6;
            }
            100% {
                background-position: 0% 50%;
                opacity: 0.3;
            }
        }

        /* Red light overlay */
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(255, 0, 0, 0.4), transparent 40%),
                        radial-gradient(circle at 80% 50%, rgba(0, 0, 255, 0.4), transparent 40%);
            animation: sirenLights 0.5s infinite;
            pointer-events: none;
            z-index: 2;
        }

        @keyframes sirenLights {
            0%, 100% {
                background: radial-gradient(circle at 20% 50%, rgba(255, 0, 0, 0.4), transparent 40%),
                            radial-gradient(circle at 80% 50%, rgba(0, 0, 255, 0.1), transparent 40%);
            }
            50% {
                background: radial-gradient(circle at 20% 50%, rgba(255, 0, 0, 0.1), transparent 40%),
                            radial-gradient(circle at 80% 50%, rgba(0, 0, 255, 0.4), transparent 40%);
            }
        }

        .container {
            text-align: center;
            max-width: 500px;
            width: 90%;
            position: relative;
            z-index: 3;
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .header {
            margin-bottom: 50px;
        }

        .game-title {
            font-size: 2.5rem;
            font-weight: bold;
            margin-bottom: 10px;
            color: #333;
        }

        .game-subtitle {
            font-size: 1rem;
            color: #666;
        }

        .auth-container {
            display: flex;
            gap: 20px;
            margin-top: 40px;
            flex-direction: column;
        }

        .auth-section {
            border: 1px solid #ddd;
            padding: 30px;
            border-radius: 8px;
            background: #f9f9f9;
        }

        .auth-section h2 {
            font-size: 1.3rem;
            margin-bottom: 20px;
            color: #333;
        }

        .form-group {
            margin-bottom: 15px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #333;
            font-size: 0.9rem;
        }

        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 1rem;
        }

        .form-group input:focus {
            outline: none;
            border-color: #0066cc;
            box-shadow: 0 0 5px rgba(0, 102, 204, 0.3);
        }

        .button {
            width: 100%;
            padding: 12px;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .button-primary {
            background: #0066cc;
            color: white;
        }

        .button-primary:hover {
            background: #0052a3;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0, 102, 204, 0.3);
        }

        .button-primary:active {
            transform: translateY(0);
        }

        .error-message {
            color: #d32f2f;
            font-size: 0.9rem;
            margin-top: 10px;
            display: none;
        }

        .success-message {
            color: #388e3c;
            font-size: 0.9rem;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>
<body>
    <!-- Audio element for siren sound -->
    <audio id="sirenSound" loop>
        <source src="data:audio/wav;base64,UklGRiYAAABXQVZFZm10IBAAAAABAAEAQB8AAAB9AAACABAAZGF0YQIAAAAAAA==" type="audio/wav">
    </audio>

    <div class="container">
        <div class="header">
            <h1 class="game-title">Australian Emergency Response</h1>
            <p class="game-subtitle">EST 2026</p>
        </div>

        <div class="auth-container">
            <!-- Login Section -->
            <div class="auth-section">
                <h2>Login</h2>
                <form id="loginForm">
                    <div class="form-group">
                        <label for="loginUsername">Username</label>
                        <input type="text" id="loginUsername" required>
                    </div>
                    <div class="form-group">
                        <label for="loginPassword">Password</label>
                        <input type="password" id="loginPassword" required>
                    </div>
                    <button type="submit" class="button button-primary">Login</button>
                    <div id="loginError" class="error-message"></div>
                </form>
            </div>

            <!-- Create Account Section -->
            <div class="auth-section">
                <h2>Create Account</h2>
                <form id="createAccountForm">
                    <div class="form-group">
                        <label for="createUsername">Username</label>
                        <input type="text" id="createUsername" required>
                    </div>
                    <div class="form-group">
                        <label for="createPassword">Password</label>
                        <input type="password" id="createPassword" required>
                    </div>
                    <button type="submit" class="button button-primary">Create Account</button>
                    <div id="createError" class="error-message"></div>
                    <div id="createSuccess" class="success-message"></div>
                </form>
            </div>
        </div>
    </div>

    <script>
        // Generate siren sound using Web Audio API
        function generateSirenSound() {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            // Set initial frequency and fade volume
            oscillator.frequency.setValueAtTime(800, audioContext.currentTime);
            gainNode.gain.setValueAtTime(0.05, audioContext.currentTime); // Very faint
            
            // Siren pitch modulation
            oscillator.frequency.exponentialRampToValueAtTime(1200, audioContext.currentTime + 0.5);
            oscillator.frequency.exponentialRampToValueAtTime(800, audioContext.currentTime + 1);
            
            oscillator.start();
            oscillator.stop(audioContext.currentTime + 1);
        }

        // Play siren on loop
        function startSiren() {
            setInterval(() => {
                try {
                    generateSirenSound();
                } catch (e) {
                    console.log('Siren audio not available');
                }
            }, 1000);
        }

        // Start siren when page loads
        window.addEventListener('load', startSiren);

        // Login form handler
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            const errorDiv = document.getElementById('loginError');

            if (username && password) {
                // Check if user exists in localStorage
                const users = JSON.parse(localStorage.getItem('users')) || {};
                if (users[username] && users[username] === password) {
                    // Successful login
                    localStorage.setItem('currentUser', username);
                    window.location.href = 'map.html';
                } else {
                    errorDiv.textContent = 'Invalid username or password';
                    errorDiv.style.display = 'block';
                }
            }
        });

        // Create account form handler
        document.getElementById('createAccountForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('createUsername').value;
            const password = document.getElementById('createPassword').value;
            const errorDiv = document.getElementById('createError');
            const successDiv = document.getElementById('createSuccess');

            if (username && password) {
                const users = JSON.parse(localStorage.getItem('users')) || {};
                
                if (users[username]) {
                    errorDiv.textContent = 'Username already exists';
                    errorDiv.style.display = 'block';
                    successDiv.style.display = 'none';
                } else {
                    // Create new account
                    users[username] = password;
                    localStorage.setItem('users', JSON.stringify(users));
                    localStorage.setItem('currentUser', username);
                    
                    successDiv.textContent = 'Account created successfully! Redirecting...';
                    successDiv.style.display = 'block';
                    errorDiv.style.display = 'none';
                    
                    setTimeout(() => {
                        window.location.href = 'map.html';
                    }, 1500);
                }
            }
        });
    </script>
</body>
</html>
