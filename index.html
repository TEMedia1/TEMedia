<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tasmanian Emergency Media</title>

<style>
body{
    font-family: Arial, sans-serif;
    margin:0;
    background:#f4f6f9; /* light professional background */
    color:#1a1a1a;
}

/* HEADER */
header{
    background:#0f172a;
    color:white;
    padding:18px;
    text-align:center;
    font-weight:600;
    letter-spacing:0.5px;
}

/* FEED WRAPPER */
.feed{
    max-width:850px;
    margin:25px auto;
    padding:0 15px;
}

/* CARD */
.card{
    background:white;
    padding:16px;
    margin-bottom:14px;
    border-radius:10px;
    border:1px solid #e6e8ec;
    box-shadow:0 2px 8px rgba(0,0,0,0.05);
    transition:0.2s ease;
}

.card:hover{
    transform:translateY(-2px);
    box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

/* EMERGENCY STYLE (clean but noticeable) */
.emergency{
    border-left:5px solid #dc2626;
}

/* TEXT */
h2{
    margin:0 0 6px 0;
    font-size:18px;
}

p{
    margin:6px 0;
    line-height:1.4;
}

/* META INFO */
.meta{
    font-size:12px;
    color:#6b7280;
}

/* BADGE */
.badge{
    background:#dc2626;
    color:white;
    padding:3px 8px;
    font-size:11px;
    border-radius:6px;
    display:inline-block;
    margin-bottom:8px;
    font-weight:600;
}

/* IMAGE */
img{
    width:100%;
    border-radius:8px;
    margin-top:10px;
    border:1px solid #e5e7eb;
}
</style>
</head>

<body>

<header>
    Tasmanian Emergency Media
</header>

<div class="feed" id="feed"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getFirestore,
collection,
query,
orderBy,
onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAIqLic00FcNgtuKZATMdHU4jRITnYO2A8",
  authDomain: "temedia20-be031.firebaseapp.com",
  projectId: "temedia20-be031",
  storageBucket: "temedia20-be031.firebasestorage.app",
  messagingSenderId: "514394139848",
  appId: "1:514394139848:web:7edabb080c12b87bc909fd"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const feed = document.getElementById("feed");

function timeFormat(t){
    if(!t) return "";
    const d = new Date(t);
    return d.toLocaleString();
}

const q = query(collection(db,"posts"), orderBy("time","desc"));

onSnapshot(q,(snap)=>{
    feed.innerHTML = "";

    snap.forEach((doc)=>{
        const d = doc.data();

        feed.innerHTML += `
        <div class="card ${d.emergency ? "emergency":""}">
            ${d.emergency ? "<div class='badge'>EMERGENCY</div>" : ""}
            
            <h2>${d.title || ""}</h2>
            <p>${d.desc || ""}</p>

            ${d.location ? `<p class="meta">📍 ${d.location}</p>` : ""}
            ${d.category ? `<p class="meta">🚨 ${d.category}</p>` : ""}

            ${d.image ? `<img src="${d.image}">` : ""}

            <p class="meta">${timeFormat(d.time)}</p>
        </div>
        `;
    });
});

</script>

</body>
</html>
