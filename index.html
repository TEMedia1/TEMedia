<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TEM Media</title>

<style>

body{
    font-family:Arial;
    background:#f5f5f5;
    margin:0;
}

.posts{
    max-width:1000px;
    margin:auto;
    padding:20px;
}

.post{
    background:white;
    padding:20px;
    margin-bottom:20px;
    border-radius:10px;
}

.post h2{
    margin-top:0;
}

.gallery{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:10px;
    margin-top:15px;
}

.gallery img{
    width:100%;
    border-radius:8px;
}

</style>
</head>
<body>

<div class="posts" id="posts"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
query,
orderBy,
getDocs
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAIqLic00FcNgtuKZATMdHU4jRITnYO2A8",
  authDomain: "temedia20-be031.firebaseapp.com",
  projectId: "temedia20-be031",
  storageBucket: "temedia20-be031.firebasestorage.app",
  messagingSenderId: "514394139848",
  appId: "1:514394139848:web:7edabb080c12b87bc909fd"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function loadPosts(){

const container = document.getElementById("posts");

const q = query(
collection(db,"posts"),
orderBy("createdAt","desc")
);

const snapshot = await getDocs(q);

snapshot.forEach(doc=>{

const post = doc.data();

let imagesHTML = "";

post.images.forEach(img=>{

imagesHTML += `
<img src="${img}">
`;

});

container.innerHTML += `
<div class="post">

<h2>${post.title}</h2>

<p>${post.description}</p>

<div class="gallery">
${imagesHTML}
</div>

</div>
`;

});

}

loadPosts();

</script>

</body>
</html>
