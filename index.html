<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tasmanian Emergency Media</title>

<style>
body{
    font-family:Arial,sans-serif;
    margin:0;
    background:#111;
    color:white;
}

header{
    background:red;
    padding:15px;
    text-align:center;
}

.feed{
    max-width:800px;
    margin:auto;
    padding:20px;
}

.card{
    background:#222;
    padding:15px;
    margin-bottom:15px;
    border-radius:10px;
}

img{
    max-width:100%;
    margin-top:10px;
    border-radius:8px;
}

.time{
    font-size:12px;
    color:#aaa;
    margin-top:5px;
}
</style>
</head>

<body>

<header>
<h1>Tasmanian Emergency Media</h1>
</header>

<div class="feed" id="feed"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getFirestore,
collection,
query,
orderBy,
onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAIqLic00FcNgtuKZATMdHU4jRITnYO2A8",
  authDomain: "temedia20-be031.firebaseapp.com",
  projectId: "temedia20-be031",
  storageBucket: "temedia20-be031.firebasestorage.app",
  messagingSenderId: "514394139848",
  appId: "1:514394139848:web:7edabb080c12b87bc909fd"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const feed = document.getElementById("feed");

function timeAgo(t){
    if(!t) return "";
    let s = Math.floor((Date.now() - t)/1000);
    if(s < 60) return "just now";
    if(s < 3600) return Math.floor(s/60)+" min ago";
    if(s < 86400) return Math.floor(s/3600)+" hours ago";
    return Math.floor(s/86400)+" days ago";
}

const q = query(collection(db,"posts"), orderBy("time","desc"));

onSnapshot(q,(snapshot)=>{
    feed.innerHTML = "";

    snapshot.forEach((doc)=>{
        const d = doc.data();

        feed.innerHTML += `
        <div class="card">
            <h2>${d.title || ""}</h2>
            <p>${d.desc || ""}</p>
            ${d.image ? `<img src="${d.image}">` : ""}
            <div class="time">${timeAgo(d.time)}</div>
        </div>
        `;
    });
});

</script>

</body>
</html>
