<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tasmanian Emergency Media</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #111;
      color: white;
      text-align: center;
    }

    header {
      background-color: red;
      padding: 20px;
    }

    h1 {
      margin: 0;
      font-size: 40px;
    }

    nav {
      background-color: #222;
      padding: 10px;
    }

    nav a {
      color: white;
      text-decoration: none;
      margin: 15px;
      font-size: 18px;
    }

    .hero {
      padding: 80px 20px;
    }

    .hero h2 {
      font-size: 36px;
    }

    .hero p {
      font-size: 20px;
      max-width: 700px;
      margin: auto;
    }

    .button {
      display: inline-block;
      margin-top: 25px;
      padding: 12px 25px;
      background-color: red;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-size: 18px;
    }

    footer {
      background-color: #222;
      padding: 15px;
      margin-top: 50px;
    }
  </style>
</head>

<body>

  <header>
    <h1>Tasmanian Emergency Media</h1>
  </header>

  <nav>
    <a href="#">Home</a>
    <a href="#">Videos</a>
    <a href="#">Gallery</a>
    <a href="#">Contact</a>
  </nav>

  <section class="hero">
    <h2>Emergency Response Videos & Media</h2>
    <p>
      Welcome to Tasmanian Emergency Media.
      We capture emergency vehicle responses, fire incidents,
      and emergency services action across Tasmania.
    </p>

    <a class="button" href="https://youtube.com">
      Visit YouTube Channel
    </a>
  </section>

  <footer>
    © 2026 Tasmanian Emergency Media
  </footer>

</body>
</html>
