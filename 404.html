<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TEM • Page Not Found</title>

<style>
body{
    font-family: Arial, sans-serif;
    margin:0;
    background:#0f172a;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    text-align:center;
}

/* BOX */
.box{
    max-width:500px;
    padding:20px;
}

/* BIG NUMBER */
h1{
    font-size:60px;
    margin:0;
}

/* TITLE */
h2{
    margin:10px 0;
    font-size:22px;
}

/* TEXT */
p{
    color:#cbd5e1;
    font-size:14px;
    line-height:1.4;
}

/* BUTTON */
a{
    display:inline-block;
    margin-top:15px;
    padding:10px 14px;
    background:#dc2626;
    color:white;
    text-decoration:none;
    border-radius:10px;
    font-weight:bold;
}

a:hover{
    background:#b91c1c;
}

/* =========================
   MOBILE FIX
   ========================= */
@media (max-width:600px){

    .box{
        padding:15px;
    }

    h1{
        font-size:44px;
    }

    h2{
        font-size:18px;
    }

    p{
        font-size:13px;
    }

    a{
        width:100%;
        padding:12px;
    }
}
</style>
</head>

<body>

<div class="box">
    <h1>404</h1>
    <h2>Page Not Found</h2>
    <p>The page you are looking for doesn’t exist or has been moved.</p>

    <a href="index.html">Go Back Home</a>
</div>

</body>
</html>
