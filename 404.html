<!DOCTYPE html>
<html lang="en">
<head>

<title>TEM • Page Not Found</title>

<style>
body{
    font-family: Arial, sans-serif;
    margin:0;
    background:#0f172a;

    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    text-align:center;
}

.box{

    padding:20px;

}

}

    margin-top:15px;
    padding:10px 14px;
    background:#2563eb;
    color:white;
    text-decoration:none;
    border-radius:8px;
}

    background:#1d4ed8;
}

</head>

<body>

<div class="box">
    <h1>404</h1>

</html>
