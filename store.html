<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TEM • Store</title>

<!-- PAYPAL -->
<script src="https://www.paypal.com/sdk/js?client-id=YOUR_CLIENT_ID&currency=AUD"></script>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore-compat.js"></script>

<style>
body{
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    margin:0;
    background:#f5f6f8;
    color:#111;
}

/* HEADER */
header{
    position:sticky;
    top:0;
    background:#0b1220;
    color:white;
    padding:14px 18px;
    font-weight:600;
}

/* LAYOUT */
.feed{
    max-width:700px;
    margin:20px auto;
    padding:10px;
}

/* CARD */
.card{
    background:white;
    padding:16px;
    margin-bottom:14px;
    border-radius:14px;
    border:1px solid #e5e7eb;
}

.card h2{
    margin:0;
    font-size:16px;
}

.card p{
    color:#6b7280;
    font-size:14px;
}

/* IMAGE */
.card img{
    width:100%;
    border-radius:12px;
}

/* BUTTON */
.add-btn{
    width:100%;
    margin-top:10px;
    padding:10px;
    border:1px solid #111827;
    background:white;
    cursor:pointer;
    border-radius:10px;
    font-weight:500;
}

.add-btn:hover{
    background:#111827;
    color:white;
}

/* CART */
.cart{
    position:fixed;
    right:15px;
    top:80px;
    width:300px;
    background:white;
    border:1px solid #e5e7eb;
    border-radius:14px;
    padding:14px;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

.cart h3{
    margin:0 0 10px 0;
}

.cart-item{
    display:flex;
    justify-content:space-between;
    font-size:13px;
    padding:3px 0;
}

.total{
    margin-top:10px;
    font-weight:600;
    border-top:1px solid #e5e7eb;
    padding-top:10px;
}

.clear-btn{
    width:100%;
    margin-top:10px;
    padding:10px;
    border:1px solid #e5e7eb;
    background:#f9fafb;
    cursor:pointer;
    border-radius:10px;
}

.clear-btn:hover{
    background:#f3f4f6;
}
</style>
</head>

<body>

<header>TEM • STORE</header>

<!-- CART -->
<div class="cart">
    <h3>Cart</h3>
    <div id="cart-items"></div>
    <div class="total" id="cart-total">Total: $0 AUD</div>

    <div id="paypal-button" style="margin-top:10px;"></div>

    <button class="clear-btn" onclick="clearCart()">Clear Cart</button>
</div>

<!-- PRODUCTS -->
<div class="feed">

    <div class="card">
        <h2>TEM Shirt</h2>
        <p>$10 AUD</p>
        <img src="TEM1.jpg">
        <button class="add-btn" onclick="addToCart('TEM Shirt', 10)">
            Add to Cart
        </button>
    </div>

    <div class="card">
        <h2>TEM Sticker Pack</h2>
        <p>$15 AUD</p>
        <img src="TEM1.jpg">
        <button class="add-btn" onclick="addToCart('Sticker Pack', 15)">
            Add to Cart
        </button>
    </div>

    <div class="card">
        <h2>TEM Hoodie</h2>
        <p>$25 AUD</p>
        <img src="TEM1.jpg">
        <button class="add-btn" onclick="addToCart('Hoodie', 25)">
            Add to Cart
        </button>
    </div>

</div>

<script>
let cart = [];

/* CART SYSTEM */
function addToCart(name, price){
    cart.push({name, price});
    updateCart();
}

function clearCart(){
    cart = [];
    updateCart();
}

function updateCart(){
    let items = document.getElementById("cart-items");
    let total = 0;

    items.innerHTML = "";

    cart.forEach(item => {
        total += item.price;

        items.innerHTML += `
            <div class="cart-item">
                <span>${item.name}</span>
                <span>$${item.price}</span>
            </div>
        `;
    });

    document.getElementById("cart-total").innerText =
        "Total: $" + total + " AUD";

    renderPayPal(total);
}

/* PAYPAL */
function renderPayPal(total){
    document.getElementById("paypal-button").innerHTML = "";

    if(total <= 0) return;

    paypal.Buttons({
        createOrder: function(data, actions){
            return actions.order.create({
                purchase_units: [{
                    amount: { value: total.toFixed(2) }
                }]
            });
        },

        onApprove: function(data, actions){
            return actions.order.capture().then(function(details){

                // SAVE TO FIREBASE
                db.collection("orders").add({
                    name: details.payer.name.given_name || "unknown",
                    email: details.payer.email_address || "unknown",
                    items: cart,
                    total: cart.reduce((sum, i) => sum + i.price, 0),
                    time: new Date().toISOString()
                });

                alert("Payment successful. Thanks " + details.payer.name.given_name);
                clearCart();
            });
        }
    }).render("#paypal-button");
}
</script>

<!-- FIREBASE INIT -->

  projectId: "tem-store",

  messagingSenderId: "519532252547",

};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
</script>

</body>
</html>
