<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TEM Store</title>

<style>
body{
    font-family:Arial;
    background:#111;
    color:white;
    margin:0;
}

header{
    background:red;
    padding:15px;
    text-align:center;
}

.store{
    max-width:900px;
    margin:auto;
    padding:20px;
}

.item{
    background:#222;
    padding:15px;
    margin-bottom:15px;
    border-radius:10px;
}

button{
    padding:10px;
    background:red;
    color:white;
    border:none;
    cursor:pointer;
    margin-top:10px;
}

.price{
    color:#aaa;
}
</style>
</head>

<body>

<header>
<h1>TEM Store</h1>
</header>

<div class="store">

<!-- TEM STICKER PRODUCT -->
<div class="item">
<h2>TEM Sticker</h2>
<p>Official Tasmanian Emergency Media sticker</p>

<p class="price">
$5.00 + $1.70 postage
</p>

<button onclick="buySticker()">Buy Now</button>
</div>

</div>

<script>
function buySticker(){

    const item = "TEM Sticker";
    const price = 5.00;
    const postage = 1.70;
    const total = (price + postage).toFixed(2);

    alert(
        "ITEM: " + item +
        "\nPRICE: $" + price +
        "\nPOSTAGE: $" + postage +
        "\nTOTAL: $" + total +
        "\n\nCheckout system not enabled yet."
    );

    // READY FOR STRIPE UPGRADE LATER
}
</script>

</body>
</html>
