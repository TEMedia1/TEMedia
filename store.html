<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TEM • Store</title>

<script src="https://www.paypal.com/sdk/js?client-id=YOUR_CLIENT_ID&currency=AUD"></script>

<style>
body{
    font-family: Arial, sans-serif;
    margin:0;
    background:#f4f6f9;
}

/* HEADER */
header{
    position:sticky;
    top:0;
    background:#0f172a;
    color:white;
    padding:10px 14px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.title{
    font-weight:bold;
}

/* STORE */
.feed{
    max-width:650px;
    margin:20px auto;
    padding:10px;
}

/* PRODUCT CARD */
.card{
    background:white;
    padding:12px;
    margin-bottom:12px;
    border-radius:12px;
    box-shadow:0 1px 6px rgba(0,0,0,0.08);
}

.card img{
    width:100%;
    border-radius:10px;
}

/* ✅ ADD TO CART BUTTON (FIXED + BIG + CLEAR) */
.add-btn{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    background:#16a34a;
    color:white;
    font-weight:bold;
    font-size:14px;
    cursor:pointer;
}

.add-btn:hover{
    background:#15803d;
}

/* CART */
.cart{
    position:fixed;
    right:10px;
    top:80px;
    width:280px;
    background:white;
    border-radius:12px;
    padding:12px;
    box-shadow:0 5px 20px rgba(0,0,0,0.2);
}

.cart h3{
    margin:0 0 10px 0;
}

.cart-item{
    display:flex;
    justify-content:space-between;
    font-size:13px;
    margin-bottom:5px;
}

.total{
    margin-top:10px;
    font-weight:bold;
}

/* CLEAR BUTTON */
.clear-btn{
    width:100%;
    margin-top:8px;
    padding:10px;
    border:none;
    border-radius:10px;
    background:#111827;
    color:white;
    cursor:pointer;
}
</style>
</head>

<body>

<header>
    <div>TEM • STORE</div>
</header>

<!-- CART -->
<div class="cart">
    <h3>🛒 Cart</h3>

    <div id="cart-items"></div>
    <div class="total" id="cart-total">Total: $0 AUD</div>

    <div id="paypal-button"></div>

    <button class="clear-btn" onclick="clearCart()">Clear Cart</button>
</div>

<!-- PRODUCTS -->
<div class="feed">

    <div class="card">
        <h2>TEM Shirt</h2>
        <p>$10 AUD</p>
        <img src="TEM1.jpg">
        <button class="add-btn" onclick="addToCart('TEM Shirt', 10)">
            ➕ ADD TO CART
        </button>
    </div>

    <div class="card">
        <h2>TEM Sticker Pack</h2>
        <p>$15 AUD</p>
        <img src="TEM1.jpg">
        <button class="add-btn" onclick="addToCart('Sticker Pack', 15)">
            ➕ ADD TO CART
        </button>
    </div>

    <div class="card">
        <h2>TEM Hoodie</h2>
        <p>$25 AUD</p>
        <img src="TEM1.jpg">
        <button class="add-btn" onclick="addToCart('Hoodie', 25)">
            ➕ ADD TO CART
        </button>
    </div>

</div>

<script>
let cart = [];

function addToCart(name, price){
    cart.push({name, price});
    updateCart();
}

function clearCart(){
    cart = [];
    updateCart();
}

function updateCart(){
    let items = document.getElementById("cart-items");
    let total = 0;

    items.innerHTML = "";

    cart.forEach(item => {
        total += item.price;

        items.innerHTML += `
            <div class="cart-item">
                <span>${item.name}</span>
                <span>$${item.price}</span>
            </div>
        `;
    });

    document.getElementById("cart-total").innerText =
        "Total: $" + total + " AUD";

    renderPayPal(total);
}

function renderPayPal(total){
    document.getElementById("paypal-button").innerHTML = "";

    if(total <= 0) return;

    paypal.Buttons({
        createOrder: function(data, actions){
            return actions.order.create({
                purchase_units: [{
                    amount: { value: total.toFixed(2) }
                }]
            });
        },

        onApprove: function(data, actions){
            return actions.order.capture().then(function(details){
                alert("Payment successful! Thanks " + details.payer.name.given_name);
                clearCart();
            });
        }
    }).render("#paypal-button");
}
</script>

</body>
</html>
