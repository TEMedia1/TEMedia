<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TEM Store</title>

<style>
body{
    font-family:Arial;
    background:#111;
    color:white;
    margin:0;
}

header{
    background:red;
    padding:15px;
    text-align:center;
}

.store{
    max-width:900px;
    margin:auto;
    padding:20px;
}

.item{
    background:#222;
    padding:15px;
    margin-bottom:15px;
    border-radius:10px;
}

button{
    padding:10px;
    background:red;
    color:white;
    border:none;
    cursor:pointer;
    margin-top:10px;
}

.price{
    color:#aaa;
}
</style>
</head>

<body>

<header>
<h1>TEM Store</h1>
</header>

<div class="store" id="store"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getFirestore,
collection,
onSnapshot,
query,
orderBy
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAIqLic00FcNgtuKZATMdHU4jRITnYO2A8",
  authDomain: "temedia20-be031.firebaseapp.com",
  projectId: "temedia20-be031",
  storageBucket: "temedia20-be031.firebasestorage.app",
  messagingSenderId: "514394139848",
  appId: "1:514394139848:web:7edabb080c12b87bc909fd"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const storeDiv = document.getElementById("store");

/* LIVE STORE ITEMS */
const q = query(collection(db,"store"), orderBy("time","desc"));

onSnapshot(q,(snap)=>{
    storeDiv.innerHTML = "";

    snap.forEach((doc)=>{
        const d = doc.data();

        storeDiv.innerHTML += `
        <div class="item">
            <h2>${d.name}</h2>
            <p>${d.desc}</p>
            <p class="price">$${d.price || "0.00"}</p>

            <button onclick="buy('${d.name}')">Buy</button>
        </div>
        `;
    });
});

window.buy = function(item){
    alert("Selected: " + item + " (checkout not enabled yet)");
}

</script>

</body>
</html>
