<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TEM • Store</title>

<style>
body{
    font-family: Arial, sans-serif;
    margin:0;
    background:#f4f6f9;
}

/* HEADER */
header{
    position:sticky;
    top:0;
    background:#0f172a;
    color:white;
    padding:10px 12px;
    display:flex;
    align-items:center;
    justify-content:space-between;
}

.logo img{
    height:30px;
    border-radius:6px;
}

.title{
    flex:1;
    text-align:center;
    font-weight:700;
    font-size:15px;
}

.nav{
    display:flex;
    gap:8px;
    font-size:12px;
}

.nav a{
    color:white;
    text-decoration:none;
}

/* STORE */
.container{
    max-width:1000px;
    margin:20px auto;
    padding:10px;
    display:grid;
    grid-template-columns: repeat(3, 1fr);
    gap:12px;
}

.card{
    background:white;
    padding:10px;
    border-radius:12px;
    border:1px solid #e6e8ec;
}

.card img{
    width:100%;
    height:160px;
    object-fit:cover;
    border-radius:10px;
}

button{
    width:100%;
    padding:8px;
    margin-top:8px;
    border:none;
    border-radius:8px;
    background:#dc2626;
    color:white;
    font-weight:bold;
}

/* PHONE ONLY */
@media (max-width: 600px){
    .container{
        grid-template-columns: 1fr;
    }

    .nav{
        font-size:10px;
        gap:5px;
    }
}
</style>
</head>

<body>

<header>
    <div class="logo">
        <img src="TEM1.jpg">
    </div>

    <div class="title">TEM • STORE</div>

    <div class="nav">
        <a href="index.html">Main</a>
        <a href="store.html">Store</a>
        <a href="page3.html">Page 3</a>
        <a href="page4.html">Page 4</a>
        <a href="page5.html">Page 5</a>
    </div>
</header>

<div class="container">

    <div class="card">
        <img src="TEM1.jpg">
        <h2>N/Ar</h2>
        <p>Coming soon.</p>
        <p><strong>$0.00 AUD</strong></p>
        <button>Buy Now</button>
    </div>

    <div class="card">

        <h2>N/Ar</h2>

    </div>

        <button>Buy Now</button>
    </div>

</div>

</body>
</html>
