<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TEM • Store</title>

<script src="https://www.paypal.com/sdk/js?client-id=YOUR_CLIENT_ID&currency=AUD"></script>

<style>
body{
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    margin:0;
    background:#f5f6f8;
    color:#111827;
}

/* HEADER */
header{
    position:sticky;
    top:0;
    background:#0b1220;
    color:white;
    padding:14px 18px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-bottom:1px solid rgba(255,255,255,0.08);
}

header div{
    font-weight:600;
    letter-spacing:0.5px;
}

/* STORE LAYOUT */
.feed{
    max-width:720px;
    margin:30px auto;
    padding:0 14px;
}

/* PRODUCT CARD */
.card{
    background:white;
    padding:16px;
    margin-bottom:14px;
    border-radius:14px;
    border:1px solid #e5e7eb;
}

.card h2{
    margin:0;
    font-size:16px;
    font-weight:600;
}

.card p{
    margin:6px 0;
    color:#6b7280;
    font-size:14px;
}

.card img{
    width:100%;
    border-radius:12px;
    margin-top:10px;
    border:1px solid #eef0f3;
}

/* PROFESSIONAL BUTTON */
.add-btn{
    width:100%;
    margin-top:12px;
    padding:10px 12px;
    border:1px solid #111827;
    background:transparent;
    color:#111827;
    border-radius:10px;
    font-weight:500;
    font-size:14px;
    cursor:pointer;
    transition:0.2s ease;
}

.add-btn:hover{
    background:#111827;
    color:white;
}

/* CART */
.cart{
    position:fixed;
    right:16px;
    top:80px;
    width:300px;
    background:white;
    border:1px solid #e5e7eb;
    border-radius:14px;
    padding:14px;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

.cart h3{
    margin:0 0 12px 0;
    font-size:14px;
    font-weight:600;
    color:#111827;
}

.cart-item{
    display:flex;
    justify-content:space-between;
    font-size:13px;
    padding:4px 0;
    color:#374151;
}

.total{
    margin-top:10px;
    font-weight:600;
    font-size:14px;
    border-top:1px solid #e5e7eb;
    padding-top:10px;
}

/* CLEAR BUTTON */
.clear-btn{
    width:100%;
    margin-top:10px;
    padding:10px;
    border:1px solid #e5e7eb;
    background:#f9fafb;
    color:#111827;
    border-radius:10px;
    font-size:13px;
    cursor:pointer;
}

.clear-btn:hover{
    background:#f3f4f6;
}
</style>
</head>

<body>

<header>
    <div>TEM • STORE</div>
</header>

<!-- CART -->
<div class="cart">
    <h3>Cart</h3>

    <div id="cart-items"></div>
    <div class="total" id="cart-total">Total: $0 AUD</div>

    <div id="paypal-button" style="margin-top:10px;"></div>

    <button class="clear-btn" onclick="clearCart()">Clear Cart</button>
</div>

<!-- PRODUCTS -->
<div class="feed">

    <div class="card">
        <h2>TEM</h2>
        <p>$0 AUD</p>
        <img src="TEM1.jpg">
        <button class="add-btn" onclick="addToCart('TEM ', 0)">
            Add to Cart
        </button>
    </div>

    <div class="card">
        <h2>TEM  </h2>
        <p>$0 </p>
        <img src="TEM1.jpg">
        <button class="add-btn" onclick="addToCart('TEM ', 0)">
            Add to Cart
        </button>
    </div>

    <div class="card">
        <h2>TEM </h2>
        <p>$0 </p>
        <img src="TEM1.jpg">
        <button class="add-btn" onclick="addToCart('TEM', 0)">
            Add to Cart
        </button>
    </div>

</div>

<script>
let cart = [];

function addToCart(name, price){
    cart.push({name, price});
    updateCart();
}

function clearCart(){
    cart = [];
    updateCart();
}

function updateCart(){
    let items = document.getElementById("cart-items");
    let total = 0;

    items.innerHTML = "";

    cart.forEach(item => {
        total += item.price;

        items.innerHTML += `
            <div class="cart-item">
                <span>${item.name}</span>
                <span>$${item.price}</span>
            </div>
        `;
    });

    document.getElementById("cart-total").innerText =
        "Total: $" + total + " AUD";

    renderPayPal(total);
}

function renderPayPal(total){
    document.getElementById("paypal-button").innerHTML = "";

    if(total <= 0) return;

    paypal.Buttons({
        createOrder: function(data, actions){
            return actions.order.create({
                purchase_units: [{
                    amount: { value: total.toFixed(2) }
                }]
            });
        },

        onApprove: function(data, actions){
            return actions.order.capture().then(function(details){
                alert("Payment successful. Thank you " + details.payer.name.given_name);
                clearCart();
            });
        }
    }).render("#paypal-button");
}
</script>

</body>
</html>
