<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TEM Store</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:white;
}

.store{
    max-width:500px;
    margin:auto;
    padding:20px;
}

.item{
    border:1px solid #ddd;
    padding:20px;
    border-radius:10px;
}

h1{
    margin-top:0;
}

.price{
    font-size:20px;
    font-weight:bold;
    margin:10px 0;
}

</style>

<!-- PAYPAL SDK -->
<script src="https://www.paypal.com/sdk/js?client-id=YOUR_PAYPAL_CLIENT_ID&currency=AUD"></script>

</head>

<body>

<div class="store">

    <div class="item">

        <h1>Stickers</h1>

        <p>
            Official TEM stickers.
        </p>

        <div class="price">
            $5.00 AUD
        </div>

        <!-- PAYPAL BUTTON -->
        <div id="paypal-button-container"></div>

    </div>

</div>

<script>

paypal.Buttons({

    createOrder: function(data, actions) {

        return actions.order.create({
            purchase_units: [{
                description: "TEM Stickers",
                amount: {
                    value: '5.00'
                }
            }]
        });

    },

    onApprove: function(data, actions) {

        return actions.order.capture().then(function(details) {

            alert(
                "Transaction completed by " +
                details.payer.name.given_name
            );

        });

    }

}).render('#paypal-button-container');

</script>

</body>
</html>
