<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TEM Staff Login</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f4f6f9;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.login-box{
    background:white;
    padding:25px;
    border-radius:12px;
    width:300px;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
}

input{
    width:100%;
    padding:10px;
    margin-bottom:10px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:10px;
    background:#0f172a;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

.error{
    color:red;
    font-size:13px;
}
</style>
</head>

<body>

<div class="login-box">

    <h2>TEM Staff Login</h2>

    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">

    <button onclick="login()">Login</button>

    <p id="error" class="error"></p>

</div>

<script>

const STAFF = {
    admin: "tem123",
    editor: "news123",
    owner: "owner123"
};

function login(){

    const user = document.getElementById("username").value.trim();
    const pass = document.getElementById("password").value;

    if(STAFF[user] && STAFF[user] === pass){

        sessionStorage.setItem("staffUser", user);

        window.location.href = "admin.html";

    }else{

        document.getElementById("error").textContent =
            "Invalid username or password";
    }
}

</script>

</body>
</html>
