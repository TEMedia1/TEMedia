<!DOCTYPE html>
<html>
<head>
<title>Staff Login</title>
<style>
body{
    font-family:Arial;
    background:#111;
    color:white;
    text-align:center;
    padding-top:100px;
}

input{
    padding:10px;
    margin:5px;
    width:200px;
}

button{
    padding:10px;
    cursor:pointer;
}
</style>
</head>

<body>

<h2>Staff Login</h2>

<input id="user" placeholder="Username"><br>
<input id="pass" type="password" placeholder="Password"><br>
<button onclick="login()">Login</button>

<script>
function login(){

    const user = document.getElementById("user").value;
    const pass = document.getElementById("pass").value;

    const users = {
        "DavidB": "TEM534",
        "TadhgD": "TEM001"
    };

    if(users[user] && users[user] === pass){
        sessionStorage.setItem("staffUser", user);
        window.location.href = "admin.html";
    } else {
        alert("Wrong login");
    }
}
</script>

</body>
</html>
