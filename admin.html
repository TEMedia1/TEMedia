<!DOCTYPE html>
<html>
<head>
<title>Staff Panel</title>

<style>
body{
    font-family:Arial;
    background:#111;
    color:white;
    margin:0;
    display:flex;
}

/* LEFT SIDE */
.left{
    width:70%;
    padding:20px;
}

/* RIGHT LOG PANEL */
.right{
    width:30%;
    background:#1a1a1a;
    padding:15px;
    border-left:2px solid #333;
    height:100vh;
    overflow:auto;
}

.card{
    background:#222;
    padding:10px;
    margin-bottom:10px;
    border-radius:8px;
}

input,textarea{
    width:100%;
    padding:8px;
    margin-bottom:10px;
}

button{
    padding:8px;
    cursor:pointer;
}

.log{
    font-size:12px;
    background:#222;
    padding:8px;
    margin-bottom:5px;
    border-radius:6px;
    color:#aaa;
}
</style>
</head>

<body>

<div class="left">

<h2>Staff Panel</h2>

<p id="welcome"></p>

<input id="title" placeholder="Title">
<textarea id="desc" placeholder="Description"></textarea>
<input id="image" placeholder="Image URL (optional)">
<button onclick="post()">Post</button>

<hr>

<h3>Posts</h3>
<div id="posts"></div>

</div>

<!-- LOG PANEL -->
<div class="right">
<h3>Activity Logs</h3>
<div id="logs"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getFirestore,
collection,
addDoc,
deleteDoc,
doc,
query,
orderBy,
onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAIqLic00FcNgtuKZATMdHU4jRITnYO2A8",
  authDomain: "temedia20-be031.firebaseapp.com",
  projectId: "temedia20-be031",
  storageBucket: "temedia20-be031.firebasestorage.app",
  messagingSenderId: "514394139848",
  appId: "1:514394139848:web:7edabb080c12b87bc909fd"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const postsDiv = document.getElementById("posts");
const logsDiv = document.getElementById("logs");

/* USER */
const user = sessionStorage.getItem("staffUser");
if(!user){
    window.location.href = "login.html";
}
document.getElementById("welcome").innerText = "Logged in as " + user;

/* LOG FUNCTION */
async function log(action, text){
    await addDoc(collection(db,"logs"),{
        user,
        action,
        text,
        time: Date.now()
    });
}

/* POST */
window.post = async function(){

    const title = document.getElementById("title").value;
    const desc = document.getElementById("desc").value;
    const image = document.getElementById("image").value;

    await addDoc(collection(db,"posts"),{
        title,
        desc,
        image,
        time: Date.now()
    });

    await log("POSTED", title);

    alert("Posted!");
}

/* LOAD POSTS */
const q1 = query(collection(db,"posts"), orderBy("time","desc"));

onSnapshot(q1,(snap)=>{
    postsDiv.innerHTML = "";

    snap.forEach((d)=>{
        const data = d.data();

        postsDiv.innerHTML += `
        <div class="card">
            <b>${data.title}</b>
            <p>${data.desc}</p>
            <button onclick="del('${d.id}','${data.title}')">Delete</button>
        </div>
        `;
    });
});

/* DELETE */
window.del = async function(id,title){
    await deleteDoc(doc(db,"posts",id));
    await log("DELETED", title);
}

/* LOGS */
const q2 = query(collection(db,"logs"), orderBy("time","desc"));

onSnapshot(q2,(snap)=>{
    logsDiv.innerHTML = "";

    snap.forEach((d)=>{
        const l = d.data();

        logsDiv.innerHTML += `
        <div class="log">
            [${l.user}] ${l.action}: ${l.text}
        </div>
        `;
    });
});

</script>

</body>
</html>

</body>
</html>
