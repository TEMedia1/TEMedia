<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
    getFirestore,
    collection,
    addDoc,
    deleteDoc,
    doc,
    query,
    orderBy,
    onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
    getStorage,
    ref,
    uploadBytes,
    getDownloadURL
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

const firebaseConfig = {
    apiKey: "AIzaSyAIqLic00FcNgtuKZATMdHU4jRITnYO2A8",
    authDomain: "temedia20-be031.firebaseapp.com",
    projectId: "temedia20-be031",
    storageBucket: "temedia20-be031.appspot.com",
    messagingSenderId: "514394139848",
    appId: "1:514394139848:web:7edabb080c12b87bc909fd"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);

const posts = document.getElementById("posts");
const logs = document.getElementById("logs");

const user = sessionStorage.getItem("staffUser");

if (!user) {
    window.location.href = "login.html";
}

/* LOGGING */
async function log(action, text) {
    try {
        await addDoc(collection(db, "logs"), {
            user,
            action,
            text,
            time: Date.now()
        });
    } catch (err) {
        console.error("Log Error:", err);
    }
}

/* CREATE POST */
window.post = async function () {

    try {

        const title = document.getElementById("title").value.trim();
        const desc = document.getElementById("desc").value.trim();
        const location = document.getElementById("location").value.trim();
        const category = document.getElementById("category").value;
        const emergency = document.getElementById("emergency").checked;

        if (!title || !desc) {
            alert("Please enter a title and description.");
            return;
        }

        const file = document.getElementById("image").files[0];

        let imageURL = "";

        if (file) {

            const fileName = `${Date.now()}_${file.name}`;
            const imageRef = ref(storage, `images/${fileName}`);

            await uploadBytes(imageRef, file);

            imageURL = await getDownloadURL(imageRef);
        }

        await addDoc(collection(db, "posts"), {
            title,
            desc,
            location,
            category,
            emergency,
            image: imageURL,
            time: Date.now()
        });

        await log("POSTED", title);

        document.getElementById("title").value = "";
        document.getElementById("desc").value = "";
        document.getElementById("location").value = "";
        document.getElementById("image").value = "";
        document.getElementById("emergency").checked = false;

        alert("Post published successfully.");

    } catch (err) {
        console.error("Post Error:", err);
        alert("Failed to publish post.");
    }
};

/* DELETE POST */
window.del = async function (id, title) {

    if (!confirm(`Delete "${title}"?`)) {
        return;
    }

    try {

        await deleteDoc(doc(db, "posts", id));

        await log("DELETED", title);

    } catch (err) {

        console.error("Delete Error:", err);

        alert("Failed to delete post.");
    }
};

/* LIVE POSTS LIST */
const postsQuery = query(
    collection(db, "posts"),
    orderBy("time", "desc")
);

onSnapshot(postsQuery, (snapshot) => {

    posts.innerHTML = "";

    snapshot.forEach((docSnap) => {

        const data = docSnap.data();

        posts.innerHTML += `
            <div class="card">
                <b>${data.title}</b><br>
                <small>${data.category}</small><br><br>

                <button onclick="del('${docSnap.id}','${data.title.replace(/'/g, "\\'")}')">
                    Delete
                </button>
            </div>
        `;
    });

}, (error) => {
    console.error("Posts Listener Error:", error);
});

/* LIVE LOGS */
const logsQuery = query(
    collection(db, "logs"),
    orderBy("time", "desc")
);

onSnapshot(logsQuery, (snapshot) => {

    logs.innerHTML = "";

    snapshot.forEach((docSnap) => {

        const data = docSnap.data();

        const date = new Date(data.time).toLocaleString();

        logs.innerHTML += `
            <div class="card">
                <b>${data.user || "Unknown"}</b><br>
                ${data.action}: ${data.text}<br>
                <small>${date}</small>
            </div>
        `;
    });

}, (error) => {
    console.error("Logs Listener Error:", error);
});

</script>
