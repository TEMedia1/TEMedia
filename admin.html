<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TEM • Admin</title>

<style>
body{font-family:Arial,sans-serif;margin:0;background:#f4f6f9;color:#1a1a1a}
header{position:sticky;top:0;background:#0f172a;color:#fff;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 10px rgba(0,0,0,.15)}
.logo img{height:32px;border-radius:6px}
.title{position:absolute;left:50%;transform:translateX(-50%);font-weight:700}
.nav{display:flex;gap:10px}.nav a{color:#fff;text-decoration:none}
.feed{max-width:1200px;margin:20px auto;padding:10px;display:grid;grid-template-columns:1fr 1fr;gap:20px}
.panel{background:#fff;padding:15px;border-radius:12px;border:1px solid #e6e8ec}
input,textarea{width:100%;padding:10px;margin-bottom:10px;box-sizing:border-box}
textarea{min-height:120px}
button{width:100%;padding:10px;border:none;border-radius:8px;background:#0f172a;color:white;cursor:pointer}
.card{background:#fff;border:1px solid #e6e8ec;border-radius:10px;padding:10px;margin-top:10px}
.deleteBtn{background:#dc2626;margin-top:10px}
@media(max-width:800px){.feed{grid-template-columns:1fr}.title{position:static;transform:none;text-align:center;width:100%}}
</style>
</head>
<body>

<header>
<div class="logo"><img src="TEM1.jpg"></div>
<div class="title">TEM • ADMIN</div>
<div class="nav">
<a href="index.html">Main</a>
<a href="store.html">Store</a>
<a href="socials.html">Socials</a>
</div>
</header>

<div class="feed">
<div class="panel">
<h2>Create Post</h2>

<input id="title" placeholder="Title">
<textarea id="desc" placeholder="Description"></textarea>
<input id="photos" type="file" multiple accept="image/*">

<button onclick="post()">Publish Post</button>

<hr>
<h3>Posts</h3>
<div id="posts"></div>
</div>

<div class="panel">
<h2>Logs</h2>
<div id="logs"></div>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, deleteDoc, doc, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyAIqLic00FcNgtuKZATMdHU4jRITnYO2A8",
  authDomain: "temedia20-be031.firebaseapp.com",
  projectId: "temedia20-be031",
  storageBucket: "temedia20-be031.firebasestorage.app",
  messagingSenderId: "514394139848",
  appId: "1:514394139848:web:7edabb080c12b87bc909fd"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);

const postsDiv = document.getElementById("posts");
const logsDiv = document.getElementById("logs");
const user = localStorage.getItem("user") || "Admin";

async function addLog(action,text){
  await addDoc(collection(db,"logs"),{user,action,text,time:Date.now()});
}

window.post = async function(){
  try{
    const title=document.getElementById("title").value.trim();
    const desc=document.getElementById("desc").value.trim();
    const files=document.getElementById("photos").files;

    let images=[];

    for(let i=0;i<files.length && i<3;i++){
      const imageRef=ref(storage,`posts/${Date.now()}-${files[i].name}`);
      await uploadBytes(imageRef,files[i]);
      images.push(await getDownloadURL(imageRef));
    }

    await addDoc(collection(db,"posts"),{
      title,desc,images,time:Date.now()
    });

    await addLog("POSTED",title);

    document.getElementById("title").value="";
    document.getElementById("desc").value="";
    document.getElementById("photos").value="";

    alert("Posted!");
  }catch(err){
    alert(err.message);
  }
}

window.del = async function(id,title){
  if(!confirm("Delete post?")) return;
  await deleteDoc(doc(db,"posts",id));
  await addLog("DELETED",title);
}

onSnapshot(query(collection(db,"posts"),orderBy("time","desc")),snap=>{
  postsDiv.innerHTML="";
  snap.forEach(d=>{
    const post=d.data();
    postsDiv.innerHTML += `
      <div class="card">
        <b>${post.title||""}</b>
        <button class="deleteBtn" onclick="del('${d.id}','${(post.title||"").replace(/'/g,"\\'")}')">Delete</button>
      </div>`;
  });
});

onSnapshot(query(collection(db,"logs"),orderBy("time","desc")),snap=>{
  logsDiv.innerHTML="";
  snap.forEach(d=>{
    const l=d.data();
    logsDiv.innerHTML += `<div class="card">[${l.user}] ${l.action}: ${l.text}</div>`;
  });
});
</script>

</body>
</html>
