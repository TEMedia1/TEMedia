<!DOCTYPE html>
<html>
<head>
<title>Staff Panel</title>

<style>
body{
    font-family: system-ui, Arial, sans-serif;
    margin:0;
    background:#f3f4f6;
    color:#111827;
}

/* TOP BAR */
.topbar{
    height:55px;
    background:#0f172a;
    color:white;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 16px;
    position:sticky;
    top:0;
    z-index:20;
}

.topbar h1{
    font-size:16px;
    margin:0;
}

.topbar button{
    background:#dc2626;
    border:none;
    color:white;
    padding:8px 10px;
    border-radius:8px;
    cursor:pointer;
}

.container{ display:flex; }

.left{
    width:70%;
    padding:20px;
}

.right{
    width:320px;
    background:white;
    position:fixed;
    right:-340px;
    top:55px;
    height:calc(100vh - 55px);
    overflow:auto;
    box-shadow:-10px 0 30px rgba(0,0,0,0.1);
    transition:0.3s;
    padding:15px;
    z-index:15;
}

.right.open{ right:0; }

input,textarea,select{
    width:100%;
    padding:10px;
    margin-bottom:10px;
    border-radius:8px;
    border:1px solid #d1d5db;
    background:white;
}

button.main{
    width:100%;
    padding:10px;
    border:none;
    border-radius:8px;
    background:#dc2626;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

.card{
    background:white;
    padding:12px;
    border-radius:10px;
    border:1px solid #e5e7eb;
    margin-bottom:10px;
}

.logToggle{
    position:fixed;
    right:15px;
    bottom:15px;
    background:#0f172a;
    color:white;
    border:none;
    padding:10px 12px;
    border-radius:50px;
    cursor:pointer;
    z-index:30;
}

.lock{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:#0f172a;
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:100;
}

.lockBox{
    background:white;
    padding:20px;
    border-radius:12px;
    width:300px;
}
</style>
</head>

<body>

<!-- LOCK SCREEN -->
<div class="lock" id="lock">
    <div class="lockBox">
        <h3>Staff Login</h3>
        <p>Sign in with Google</p>
        <button class="main" onclick="googleLogin()">Sign in with Google</button>
    </div>
</div>

<!-- TOP BAR -->
<div class="topbar">
    <h1>Staff Control Panel</h1>
    <button onclick="toggleLogs()">Logs</button>
</div>

<div class="container">

<div class="left">

<h2>Post System</h2>

<input id="title" placeholder="Title">
<textarea id="desc" placeholder="Description"></textarea>
<input id="location" placeholder="Location">

<select id="category">
<option>Fire</option>
<option>Rescue</option>
<option>Traffic</option>
<option>General</option>
</select>

<input id="image" type="file">

<label>
<input type="checkbox" id="emergency"> Emergency Mode
</label>

<button class="main" onclick="post()">Post</button>

<hr>

<h3>Posts</h3>
<div id="posts"></div>

</div>

<!-- LOGS -->
<div class="right" id="logsPanel">
<h3>Logs</h3>
<div id="logs"></div>
</div>

</div>

<button class="logToggle" onclick="toggleLogs()">Logs</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, addDoc, deleteDoc, doc, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

/* FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyBQ-dRGRRLNEO...",
  authDomain: "temedia1000.firebaseapp.com",
  projectId: "temedia1000",
  storageBucket: "temedia1000.firebasestorage.app",
  messagingSenderId: "534982245676",
  appId: "1:534982245676:web:a4fdc146c2adf843e08089"
};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);
const provider = new GoogleAuthProvider();

const db = getFirestore(app);
const storage = getStorage(app);

/* 🔒 YOUR ADMIN UID */
const ADMIN_UID = "LaodpGb5TVUS806xsXBCkrcx7T63";

let currentUser = null;
let isAdmin = false;

/* LOGIN */
window.googleLogin = async function () {
    await signInWithPopup(auth, provider);
};

/* AUTH STATE */
onAuthStateChanged(auth, (user) => {
    currentUser = user;

    if (user && user.uid === ADMIN_UID) {
        isAdmin = true;
        document.getElementById("lock").style.display = "none";
    } else {
        isAdmin = false;
        document.getElementById("lock").style.display = "flex";
    }
});

/* LOGS TOGGLE */
window.toggleLogs = function(){
    document.getElementById("logsPanel").classList.toggle("open");
};

/* LOG */
async function log(action,text){
    await addDoc(collection(db,"logs"),{
        user: currentUser?.email || "unknown",
        action,
        text,
        time: Date.now()
    });
}

/* POST */
window.post = async function(){

    if(!isAdmin){
        alert("Not authorised");
        return;
    }

    const title = document.getElementById("title").value;
    const desc = document.getElementById("desc").value;
    const location = document.getElementById("location").value;
    const category = document.getElementById("category").value;
    const emergency = document.getElementById("emergency").checked;

    const file = document.getElementById("image").files[0];

    let imageURL = "";

    if(file){
        const imgRef = ref(storage,"images/"+Date.now());
        await uploadBytes(imgRef,file);
        imageURL = await getDownloadURL(imgRef);
    }

    await addDoc(collection(db,"posts"),{
        title,
        desc,
        location,
        category,
        emergency,
        image:imageURL,
        time:Date.now(),
        uid: currentUser.uid
    });

    await log("POSTED", title);

    alert("Posted!");
};

/* POSTS */
const q1 = query(collection(db,"posts"),orderBy("time","desc"));

onSnapshot(q1,(snap)=>{
    posts.innerHTML="";

    snap.forEach((d)=>{
        const data=d.data();

        posts.innerHTML+=`
        <div class="card">
            <b>${data.title}</b><br>
            <button onclick="del('${d.id}','${data.title}')">Delete</button>
        </div>
        `;
    });
});

/* DELETE */
window.del = async function(id,title){

    if(!isAdmin){
        alert("Not authorised");
        return;
    }

    await deleteDoc(doc(db,"posts",id));
    await log("DELETED",title);
};

/* LOGS */
const q2 = query(collection(db,"logs"),orderBy("time","desc"));

onSnapshot(q2,(snap)=>{
    logs.innerHTML="";

    snap.forEach((d)=>{
        const l=d.data();

        logs.innerHTML+=`
        <div class="card">
            [${l.user}] ${l.action}: ${l.text}
        </div>
        `;
    });
});

</script>

</body>
</html>
