<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Staff Panel</title>

<style>
body{
    font-family:Arial;
    background:#111;
    color:white;
    margin:0;
    padding:20px;
}

.card{
    background:#222;
    padding:10px;
    margin-bottom:10px;
    border-radius:10px;
}

button{
    padding:8px;
    margin-top:5px;
    cursor:pointer;
}
</style>
</head>

<body>

<h2>Admin Panel</h2>

<input id="title" placeholder="Title"><br><br>
<textarea id="desc" placeholder="Description"></textarea><br><br>
<input id="image" placeholder="Image URL (optional)"><br><br>

<button onclick="post()">Post</button>

<hr>

<h3>Manage Posts</h3>
<div id="adminFeed"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getFirestore,
collection,
addDoc,
deleteDoc,
doc,
query,
orderBy,
onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAIqLic00FcNgtuKZATMdHU4jRITnYO2A8",
  authDomain: "temedia20-be031.firebaseapp.com",
  projectId: "temedia20-be031",
  storageBucket: "temedia20-be031.firebasestorage.app",
  messagingSenderId: "514394139848",
  appId: "1:514394139848:web:7edabb080c12b87bc909fd"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const adminFeed = document.getElementById("adminFeed");

/* POST */
window.post = async function(){

    const title = document.getElementById("title").value;
    const desc = document.getElementById("desc").value;
    const image = document.getElementById("image").value;

    await addDoc(collection(db,"posts"),{
        title,
        desc,
        image,
        time: Date.now()
    });

    alert("Posted!");
}

/* LOAD + DELETE */
const q = query(collection(db,"posts"), orderBy("time","desc"));

onSnapshot(q,(snapshot)=>{
    adminFeed.innerHTML = "";

    snapshot.forEach((d)=>{
        const data = d.data();

        adminFeed.innerHTML += `
        <div class="card">
            <b>${data.title}</b>
            <p>${data.desc}</p>

            <button onclick="del('${d.id}')">Delete</button>
        </div>
        `;
    });
});

/* DELETE FUNCTION */
window.del = async function(id){
    await deleteDoc(doc(db,"posts",id));
    alert("Deleted!");
}

</script>

</body>
</html>
