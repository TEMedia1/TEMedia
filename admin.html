<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TEM Admin</title>

<style>
body{
    font-family:Arial;
    max-width:800px;
    margin:auto;
    padding:20px;
}

input, textarea{
    width:100%;
    padding:10px;
    margin-bottom:10px;
}

button{
    padding:10px 20px;
}

#status{
    margin-top:10px;
}
</style>
</head>
<body>

<h1>Create Post</h1>

<input type="text" id="title" placeholder="Title">

<textarea id="description" rows="5" placeholder="Description"></textarea>

<input type="file" id="image" accept="image/*">

<br><br>

<button id="postBtn">POST</button>

<div id="status"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
getStorage,
ref,
uploadBytes,
getDownloadURL
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyAIqLic00FcNgtuKZATMdHU4jRITnYO2A8",
  authDomain: "temedia20-be031.firebaseapp.com",
  projectId: "temedia20-be031",
  storageBucket: "temedia20-be031.firebasestorage.app",
  messagingSenderId: "514394139848",
  appId: "1:514394139848:web:7edabb080c12b87bc909fd"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);

document.getElementById("postBtn").addEventListener("click", async () => {

const title = document.getElementById("title").value;
const description = document.getElementById("description").value;
const file = document.getElementById("image").files[0];

if(!title || !file){
    alert("Title and image required");
    return;
}

try{

document.getElementById("status").innerHTML = "Uploading...";

const imageRef = ref(storage, "posts/" + Date.now());

await uploadBytes(imageRef, file);

const imageURL = await getDownloadURL(imageRef);

await addDoc(collection(db, "posts"), {
    title,
    description,
    image:imageURL,
    createdAt:serverTimestamp()
});

document.getElementById("status").innerHTML = "Post Created!";

}catch(err){
    console.error(err);
    document.getElementById("status").innerHTML = err.message;
}

});

</script>

</body>
</html>
