<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TEM Admin</title>

<style>
body{
    font-family:Arial;
    max-width:800px;
    margin:auto;
    padding:20px;
}

input, textarea{
    width:100%;
    padding:10px;
    margin-bottom:10px;
}

button{
    padding:12px 20px;
    cursor:pointer;
}

#status{
    margin-top:10px;
    font-weight:bold;
}
</style>
</head>
<body>

<h1>Create Post</h1>

<input type="text" id="title" placeholder="Post Title">

<textarea id="description" rows="6" placeholder="Description"></textarea>

<input type="file" id="images" multiple accept="image/*">

<button onclick="createPost()">POST</button>

<div id="status"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
serverTimestamp
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
getStorage,
ref,
uploadBytes,
getDownloadURL
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyAIqLic00FcNgtuKZATMdHU4jRITnYO2A8",
  authDomain: "temedia20-be031.firebaseapp.com",
  projectId: "temedia20-be031",
  storageBucket: "temedia20-be031.firebasestorage.app",
  messagingSenderId: "514394139848",
  appId: "1:514394139848:web:7edabb080c12b87bc909fd"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);

window.createPost = async function(){

const title = document.getElementById("title").value;
const description = document.getElementById("description").value;
const files = document.getElementById("images").files;
const status = document.getElementById("status");

if(!title){
    alert("Enter a title");
    return;
}

if(files.length < 2 || files.length > 4){
    alert("Upload between 2 and 4 images");
    return;
}

status.innerHTML = "Uploading...";

try{

let imageUrls = [];

for(let i=0;i<files.length;i++){

const file = files[i];

const storageRef = ref(
storage,
`posts/${Date.now()}_${file.name}`
);

await uploadBytes(storageRef,file);

const url = await getDownloadURL(storageRef);

imageUrls.push(url);

}

await addDoc(collection(db,"posts"),{
title,
description,
images:imageUrls,
createdAt:serverTimestamp()
});

status.innerHTML = "Post Created!";

document.getElementById("title").value="";
document.getElementById("description").value="";
document.getElementById("images").value="";

}catch(err){
console.error(err);
status.innerHTML = "Error creating post";
}

}

</script>

</body>
</html>
