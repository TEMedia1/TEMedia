<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Australian Emergency Response - World Map</title>

  <!-- Leaflet JS for 2D Map -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      font-family: 'Arial', sans-serif;
      overflow: hidden;
    }

    #mapContainer {
  position: fixed;
  top: 0;
  left: 0;
  right: 350px;
  bottom: 0;
  z-index: 1;
};
    }

    /* Right Side GUI */
    #sidebar {
  position: fixed;
  right: 0;
  top: 0;
  width: 350px;
  height: 100vh;
  background: white;
  box-shadow: -2px 0 15px rgba(0, 0, 0, 0.2);
  overflow-y: auto;
  padding: 20px;
  box-sizing: border-box;
  border-left: 2px solid #ddd;
  z-index: 1000;
}
    }

    .sidebar-header {
      font-size: 22px;
      font-weight: bold;
      margin-bottom: 20px;
      text-align: center;
      color: #333;
      padding-bottom: 15px;
      border-bottom: 2px solid #0066cc;
    }

    .money-display {
      background: #f0f7ff;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 25px;
      text-align: center;
      border: 2px solid #0066cc;
    }

    .money-label {
      font-size: 12px;
      text-transform: uppercase;
      color: #666;
      margin-bottom: 5px;
      font-weight: bold;
      letter-spacing: 1px;
    }

    .money-amount {
      font-size: 32px;
      font-weight: bold;
      color: #0066cc;
    }

    .buildings-section {
      margin-top: 30px;
    }

    .section-title {
      font-size: 16px;
      font-weight: bold;
      color: #333;
      margin-bottom: 15px;
      text-transform: uppercase;
      letter-spacing: 1px;
      border-bottom: 2px solid #0066cc;
      padding-bottom: 10px;
    }

    .building-item {
      background: #f9f9f9;
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 6px;
      border-left: 4px solid #0066cc;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      transition: all 0.3s ease;
      border: 1px solid #ddd;
    }

    .building-item:hover {
      background: #f0f7ff;
      transform: translateX(-5px);
      box-shadow: 0 2px 8px rgba(0, 102, 204, 0.15);
    }

    .building-item.unavailable {
      opacity: 0.5;
      cursor: not-allowed;
      background: #f5f5f5;
    }

    .building-item.unavailable:hover {
      background: #f5f5f5;
      transform: none;
    }

    .building-name {
      font-weight: bold;
      font-size: 14px;
      color: #333;
    }

    .building-cost {
      background: #0066cc;
      color: white;
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: bold;
      white-space: nowrap;
    }

    .building-item.unavailable .building-cost {
      background: #ccc;
    }

    .building-item.free {
      border-left-color: #388e3c;
    }

    .building-item.free .building-cost {
      background: #388e3c;
    }

    /* Modal Dialog */
    .modal {
      display: none;
      position: fixed;
      z-index: 2000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.7);
    }

    .modal-content {
      background: white;
      margin: 10% auto;
      padding: 30px;
      border: 2px solid #0066cc;
      width: 90%;
      max-width: 400px;
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      max-height: 80vh;
      overflow-y: auto;
    }

    .modal-header {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 20px;
      color: #333;
      text-align: center;
    }

    .close {
      color: #aaa;
      float: right;
      font-size: 28px;
      font-weight: bold;
      cursor: pointer;
      transition: color 0.3s ease;
      line-height: 20px;
    }

    .close:hover {
      color: #333;
    }

    .success-message {
      background: #d4edda;
      color: #155724;
      padding: 12px;
      border-radius: 5px;
      margin-top: 10px;
      text-align: center;
      font-weight: bold;
      display: none;
    }

    .success-message.show {
      display: block;
    }

    .instruction-text {
      color: #666;
      font-size: 12px;
      text-align: center;
      margin-top: 10px;
      font-style: italic;
    }

    .logout-button {
      width: 100%;
      padding: 12px;
      margin-top: 20px;
      background: #dc2626;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .logout-button:hover {
      background: #b91c1c;
      transform: translateY(-2px);
      box-shadow: 0 4px 8px rgba(220, 38, 38, 0.3);
    }

    /* Station Info Styles */
    .station-info {
      color: #333;
    }

    .station-info h3 {
      margin-top: 15px;
      margin-bottom: 10px;
      color: #0066cc;
      font-size: 16px;
    }

    .vehicle-list {
      background: #f0f7ff;
      padding: 10px;
      border-radius: 5px;
      border-left: 4px solid #0066cc;
    }

    .vehicle-item {
      padding: 5px 0;
      font-size: 14px;
      color: #333;
    }

    .call-item {
      background: #fff3cd;
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 6px;
      border-left: 4px solid #ffc107;
      cursor: pointer;
      transition: all 0.3s ease;
      border: 1px solid #ffc107;
    }

    .call-item:hover {
      background: #ffe69c;
      transform: translateX(5px);
    }

    .call-type {
      font-weight: bold;
      color: #333;
    }

    .call-distance {
      font-size: 12px;
      color: #666;
      margin-top: 5px;
    }

    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: #f1f1f1;
    }

    ::-webkit-scrollbar-thumb {
      background: #0066cc;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #0052a3;
    }

    .vehicle-responding {
      font-size: 12px;
      color: #155724;
      margin-top: 5px;
    }
  </style>
</head>
<body>

  <div id="mapContainer"></div>

  <!-- Right Sidebar GUI -->
  <div id="sidebar">
    <div class="sidebar-header">Create Building</div>
    
    <div class="money-display">
      <div class="money-label">Your Budget</div>
      <div class="money-amount" id="moneyDisplay">$250,000</div>
    </div>

    <div class="buildings-section">
      <div class="section-title">Buildings:</div>
      
      <div class="building-item free" id="dispatchCentre">
        <div class="building-name">Dispatch Centre</div>
        <div class="building-cost">FREE</div>
      </div>

      <div class="building-item" id="policeStation">
        <div class="building-name">Police Station</div>
        <div class="building-cost">$100k</div>
      </div>

      <div class="building-item" id="fireStation">
        <div class="building-name">Fire Station</div>
        <div class="building-cost">$100k</div>
      </div>

      <div class="building-item" id="ambulanceStation">
        <div class="building-name">Ambulance Station</div>
        <div class="building-cost">$100k</div>
      </div>

      <div class="building-item" id="sesStation">
        <div class="building-name">SES Station</div>
        <div class="building-cost">$100k</div>
      </div>
    </div>

    <button class="logout-button" id="logoutButton">Logout</button>
  </div>

  <!-- Station Info Modal -->
  <div id="stationModal" class="modal">
    <div class="modal-content">
      <span class="close" id="closeStationModal">&times;</span>
      <div class="modal-header" id="stationName">Station Info</div>
      
      <div id="stationContent" class="station-info">
        <!-- Content populated dynamically -->
      </div>
    </div>
  </div>

  <script>
    // Initialize map
    const map = L.map('mapContainer').setView([20, 0], 2);

    // Add OpenStreetMap tiles
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap contributors',
      maxZoom: 19
    }).addTo(map);

    // Game State
    const gameState = {
      money: 250000,
      selectedBuilding: null,
      selectedBuildingFree: false,
      stations: [],
      calls: [],
      placingBuilding: false,
      dispatchCentreUsed: false,
      respondingVehicles: []
    };

    // Building Definitions
    const buildingDefinitions = {
      'dispatchCentre': { name: 'Dispatch Centre', cost: 0, icon: '📡', vehicles: [] },
      'policeStation': { name: 'Police Station', cost: 100000, icon: '🚔', vehicles: [{ type: 'Police Car', count: 1 }] },
      'fireStation': { name: 'Fire Station', cost: 100000, icon: '🚒', vehicles: [{ type: 'Pumper', count: 1 }] },
      'ambulanceStation': { name: 'Ambulance Station', cost: 100000, icon: '🚑', vehicles: [{ type: 'Ambulance', count: 1 }] },
      'sesStation': { name: 'SES Station', cost: 100000, icon: '🛟', vehicles: [{ type: 'Rescue Truck', count: 1 }] }
    };

    // Call Types
    const callTypes = ['Car Fire', 'Fallen Person', 'Theft'];

    // Helper function to convert lat/lng to pixel distance
    function latLngToPixels(latlng1, latlng2) {
      const point1 = map.latLngToContainerPoint(latlng1);
      const point2 = map.latLngToContainerPoint(latlng2);
      return point1.distanceTo(point2);
    }

    // Check if user is logged in
    function checkLogin() {
      const currentUser = localStorage.getItem('currentUser');
      if (!currentUser) {
        window.location.href = 'index.html';
        return;
      }
      return currentUser;
    }

    // Load player data
    function loadPlayerData(username) {
      const playerDataKey = `playerData_${username}`;
      const defaultData = {
        money: 250000,
        stations: [],
        dispatchCentreBuilt: false
      };

      const data = JSON.parse(localStorage.getItem(playerDataKey)) || defaultData;
      gameState.money = data.money || 250000;
      gameState.stations = data.stations || [];
      gameState.dispatchCentreUsed = data.dispatchCentreBuilt || false;

      return data;
    }

    // Save player data
    function savePlayerData(username) {
      const playerDataKey = `playerData_${username}`;
      const data = {
        money: gameState.money,
        stations: gameState.stations,
        dispatchCentreBuilt: gameState.dispatchCentreUsed
      };
      localStorage.setItem(playerDataKey, JSON.stringify(data));
    }

    // Update money display
    function updateMoneyDisplay() {
      const moneyDisplay = document.getElementById('moneyDisplay');
      moneyDisplay.textContent = '$' + gameState.money.toLocaleString();
      updateBuildingAvailability();
    }

    // Update building availability
    function updateBuildingAvailability() {
      const buildings = ['policeStation', 'fireStation', 'ambulanceStation', 'sesStation'];
      
      buildings.forEach(buildingId => {
        const element = document.getElementById(buildingId);
        const cost = buildingDefinitions[buildingId].cost;
        
        if (gameState.money >= cost) {
          element.classList.remove('unavailable');
        } else {
          element.classList.add('unavailable');
        }
      });

      if (!gameState.dispatchCentreUsed) {
        document.getElementById('dispatchCentre').classList.remove('unavailable');
      } else {
        document.getElementById('dispatchCentre').classList.add('unavailable');
      }
    }

    // Create custom icon for station
    function createStationIcon(buildingType) {
      const icon = buildingDefinitions[buildingType].icon;
      return L.divIcon({
        html: `<div style="font-size: 32px; display: flex; justify-content: center; align-items: center; width: 40px; height: 40px;">${icon}</div>`,
        iconSize: [40, 40],
        className: 'station-icon'
      });
    }

    // Add station to map
    function addStationToMap(buildingType, latitude, longitude) {
      const building = buildingDefinitions[buildingType];
      
      const station = {
        id: Date.now(),
        type: buildingType,
        name: building.name,
        lat: latitude,
        lng: longitude,
        vehicles: building.vehicles.map(v => ({ ...v })),
        marker: null,
        responseAreas: []
      };

      const marker = L.marker([latitude, longitude], {
        icon: createStationIcon(buildingType)
      }).addTo(map);

      marker.on('click', function() {
        showStationInfo(station);
      });

      station.marker = marker;
      gameState.stations.push(station);

      // Draw response area (100px circle)
      const radiusInMeters = 100 / (map.getZoom() * 10);
      const circle = L.circle([latitude, longitude], {
        radius: radiusInMeters,
        color: '#0066cc',
        fillColor: '#0066cc',
        fillOpacity: 0.1,
        weight: 2,
        dashArray: '5, 5'
      }).addTo(map);

      station.responseAreas.push(circle);

      return station;
    }

    // Show station info
    function showStationInfo(station) {
      const modal = document.getElementById('stationModal');
      const stationName = document.getElementById('stationName');
      const stationContent = document.getElementById('stationContent');

      stationName.textContent = station.name;
      
      let html = `<h3>Vehicles:</h3><div class="vehicle-list">`;
      station.vehicles.forEach(vehicle => {
        html += `<div class="vehicle-item">• ${vehicle.type} (${vehicle.count})</div>`;
      });
      html += `</div>`;

      // Get nearby calls
      const nearbyCalls = gameState.calls.filter(call => {
        const distance = latLngToPixels(station.marker.getLatLng(), L.latLng(call.lat, call.lng));
        return distance <= 100;
      });

      if (nearbyCalls.length > 0) {
        html += `<h3>Nearby Calls (within range):</h3>`;
        nearbyCalls.forEach(call => {
          html += `
            <div class="call-item" onclick="respondToCall(${call.id}, ${station.id})">
              <div class="call-type">${call.type}</div>
              <div class="call-distance">Distance: ${latLngToPixels(station.marker.getLatLng(), L.latLng(call.lat, call.lng)).toFixed(0)}px</div>
            </div>
          `;
        });
      }

      stationContent.innerHTML = html;
      modal.style.display = 'block';
    }

    // Respond to call
    function respondToCall(callId, stationId) {
      const call = gameState.calls.find(c => c.id === callId);
      const station = gameState.stations.find(s => s.id === stationId);

      if (!call || !station) return;

      // Get vehicle to respond
      let respondingVehicle = null;
      if (station.type === 'fireStation') {
        respondingVehicle = { icon: '🚒', name: 'Pumper' };
      } else if (station.type === 'policeStation') {
        respondingVehicle = { icon: '🚔', name: 'Police Car' };
      } else if (station.type === 'ambulanceStation') {
        respondingVehicle = { icon: '🚑', name: 'Ambulance' };
      } else if (station.type === 'sesStation') {
        respondingVehicle = { icon: '🛟', name: 'Rescue Truck' };
      }

      if (!respondingVehicle) return;

      // Draw line from station to call
      const lineLayer = L.polyline([
        [station.lat, station.lng],
        [call.lat, call.lng]
      ], {
        color: '#dc2626',
        weight: 3,
        opacity: 0.8,
        dashArray: '5, 5'
      }).addTo(map);

      // Animate vehicle
      const vehicleMarker = L.marker([station.lat, station.lng], {
        icon: L.divIcon({
          html: `<div style="font-size: 24px;">${respondingVehicle.icon}</div>`,
          iconSize: [30, 30],
          className: 'responding-vehicle'
        })
      }).addTo(map);

      // Animate movement
      let progress = 0;
      const interval = setInterval(() => {
        progress += 0.02;
        if (progress >= 1) {
          clearInterval(interval);
          vehicleMarker.remove();
          lineLayer.remove();
          
          // Remove call
          gameState.calls = gameState.calls.filter(c => c.id !== callId);
          
          // Close modal
          document.getElementById('stationModal').style.display = 'none';
          
          return;
        }

        const currentLat = station.lat + (call.lat - station.lat) * progress;
        const currentLng = station.lng + (call.lng - station.lng) * progress;
        vehicleMarker.setLatLng([currentLat, currentLng]);
      }, 50);

      gameState.respondingVehicles.push({
        id: Date.now(),
        vehicleMarker,
        lineLayer,
        interval,
        callId
      });
    }

    // Generate random call
    function generateRandomCall() {
      if (gameState.stations.length === 0) return;

      const station = gameState.stations[Math.floor(Math.random() * gameState.stations.length)];
      const callType = callTypes[Math.floor(Math.random() * callTypes.length)];
      
      // Generate call within 100px of station
      const point = map.latLngToContainerPoint([station.lat, station.lng]);
      const angle = Math.random() * Math.PI * 2;
      const distance = Math.random() * 100;
      const newPoint = L.point(
        point.x + Math.cos(angle) * distance,
        point.y + Math.sin(angle) * distance
      );
      const latlng = map.containerPointToLatLng(newPoint);

      const call = {
        id: Date.now(),
        type: callType,
        lat: latlng.lat,
        lng: latlng.lng,
        marker: L.marker([latlng.lat, latlng.lng], {
          icon: L.divIcon({
            html: `<div style="font-size: 24px; color: #dc2626;">📍</div>`,
            iconSize: [30, 30],
            className: 'call-marker'
          })
        }).bindPopup(`<b>${callType}</b>`).addTo(map)
      };

      gameState.calls.push(call);
    }

    // Initialize
    const currentUser = checkLogin();
    loadPlayerData(currentUser);
    updateMoneyDisplay();

    // Load stations from saved data
    const savedStations = gameState.stations.slice();
    gameState.stations = [];
    savedStations.forEach(station => {
      // Rebuild stations
      const newStation = addStationToMap(station.type, station.lat, station.lng);
      // Restore vehicles
      newStation.vehicles = station.vehicles;
    });

    // Building click handlers
    document.getElementById('dispatchCentre').addEventListener('click', function() {
      if (gameState.dispatchCentreUsed) return;
      
      const element = this;
      if (element.classList.contains('unavailable')) return;

      gameState.selectedBuilding = 'dispatchCentre';
      gameState.selectedBuildingFree = true;
      gameState.placingBuilding = true;
    });

    document.getElementById('policeStation').addEventListener('click', function() {
      if (!this.classList.contains('unavailable')) {
        gameState.selectedBuilding = 'policeStation';
        gameState.selectedBuildingFree = false;
        gameState.placingBuilding = true;
      }
    });

    document.getElementById('fireStation').addEventListener('click', function() {
      if (!this.classList.contains('unavailable')) {
        gameState.selectedBuilding = 'fireStation';
        gameState.selectedBuildingFree = false;
        gameState.placingBuilding = true;
      }
    });

    document.getElementById('ambulanceStation').addEventListener('click', function() {
      if (!this.classList.contains('unavailable')) {
        gameState.selectedBuilding = 'ambulanceStation';
        gameState.selectedBuildingFree = false;
        gameState.placingBuilding = true;
      }
    });

    document.getElementById('sesStation').addEventListener('click', function() {
      if (!this.classList.contains('unavailable')) {
        gameState.selectedBuilding = 'sesStation';
        gameState.selectedBuildingFree = false;
        gameState.placingBuilding = true;
      }
    });

    // Close station modal
    document.getElementById('closeStationModal').addEventListener('click', function() {
      document.getElementById('stationModal').style.display = 'none';
    });

    // Map click handler for building placement
    map.on('click', function(e) {
      if (!gameState.placingBuilding || !gameState.selectedBuilding) return;

      const latitude = e.latlng.lat;
      const longitude = e.latlng.lng;

      // Store building info before placement
      const buildingType = gameState.selectedBuilding;
      const wasFree = gameState.selectedBuildingFree;

      // Deduct money if not free
      if (!wasFree) {
        const cost = buildingDefinitions[buildingType].cost;
        gameState.money -= cost;
      }

      // Add station to map
      addStationToMap(buildingType, latitude, longitude);

      // Mark dispatch centre as used if applicable
      if (buildingType === 'dispatchCentre') {
        gameState.dispatchCentreUsed = true;
      }

      // Save data
      savePlayerData(currentUser);
      updateMoneyDisplay();

      // Reset placement mode
      gameState.placingBuilding = false;
      gameState.selectedBuilding = null;
    });

    // Escape key to cancel building placement
    document.addEventListener('keydown', function(event) {
      if (event.key === 'Escape' && gameState.placingBuilding) {
        // Refund money if applicable
        if (!gameState.selectedBuildingFree && gameState.selectedBuilding) {
          const cost = buildingDefinitions[gameState.selectedBuilding].cost;
          gameState.money += cost;
        }

        // Reset dispatch centre flag if cancelled
        if (gameState.selectedBuilding === 'dispatchCentre') {
          gameState.dispatchCentreUsed = false;
        }

        gameState.placingBuilding = false;
        gameState.selectedBuilding = null;
        updateMoneyDisplay();
      }
    });

    // Logout button
    document.getElementById('logoutButton').addEventListener('click', function() {
      localStorage.removeItem('currentUser');
      window.location.href = 'index.html';
    });

    // Save data periodically
    setInterval(() => {
      savePlayerData(currentUser);
    }, 30000);

    // Generate random calls every 10 seconds
    setInterval(() => {
      if (gameState.stations.length > 0 && Math.random() > 0.7) {
        generateRandomCall();
      }
    }, 10000);
  </script>

</body>
</html>
