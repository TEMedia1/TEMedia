<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>World Map</title>

  <!-- Leaflet CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: Arial, sans-serif;
    }

    #map {
      width: calc(100% - 300px);
      height: 100vh;
      float: left;
    }

    /* Right Side GUI */
    #sidebar {
      width: 300px;
      height: 100vh;
      float: right;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      box-shadow: -2px 0 10px rgba(0, 0, 0, 0.3);
      overflow-y: auto;
      padding: 20px;
      box-sizing: border-box;
      color: white;
    }

    .sidebar-header {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 30px;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .money-display {
      background: rgba(0, 0, 0, 0.3);
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
      text-align: center;
      border: 2px solid rgba(255, 255, 255, 0.5);
    }

    .money-label {
      font-size: 12px;
      text-transform: uppercase;
      opacity: 0.8;
      margin-bottom: 5px;
    }

    .money-amount {
      font-size: 28px;
      font-weight: bold;
      color: #4ade80;
    }

    .button-group {
      margin-top: 20px;
    }

    .build-button {
      width: 100%;
      padding: 15px;
      margin-bottom: 10px;
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 1px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
    }

    .build-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
    }

    .build-button:active {
      transform: translateY(0);
    }

    /* Modal Dialog */
    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.6);
    }

    .modal-content {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      margin: 5% auto;
      padding: 30px;
      border: 2px solid #f5576c;
      width: 90%;
      max-width: 500px;
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      color: white;
    }

    .modal-header {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 20px;
      text-align: center;
      text-transform: uppercase;
      border-bottom: 2px solid rgba(255, 255, 255, 0.3);
      padding-bottom: 15px;
    }

    .building-list {
      max-height: 400px;
      overflow-y: auto;
    }

    .building-item {
      background: rgba(0, 0, 0, 0.2);
      padding: 15px;
      margin-bottom: 12px;
      border-radius: 8px;
      border-left: 4px solid #4ade80;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .building-item:hover {
      background: rgba(0, 0, 0, 0.4);
      transform: translateX(5px);
    }

    .building-item.unavailable {
      opacity: 0.5;
      cursor: not-allowed;
      border-left-color: #ef4444;
    }

    .building-name {
      font-weight: bold;
      font-size: 16px;
    }

    .building-cost {
      background: rgba(255, 255, 255, 0.2);
      padding: 5px 12px;
      border-radius: 5px;
      font-size: 14px;
      white-space: nowrap;
    }

    .close {
      color: #aaa;
      float: right;
      font-size: 28px;
      font-weight: bold;
      cursor: pointer;
      transition: color 0.3s ease;
    }

    .close:hover,
    .close:focus {
      color: white;
    }

    .insufficient-funds {
      background: #ef4444;
      color: white;
      padding: 12px;
      border-radius: 5px;
      margin-top: 10px;
      text-align: center;
      font-weight: bold;
      display: none;
    }

    .insufficient-funds.show {
      display: block;
    }
  </style>
</head>
<body>

  <div id="map"></div>

  <!-- Right Sidebar GUI -->
  <div id="sidebar">
    <div class="sidebar-header">City Builder</div>
    
    <div class="money-display">
      <div class="money-label">Your Budget</div>
      <div class="money-amount" id="moneyDisplay">$200,000</div>
    </div>

    <div class="button-group">
      <button class="build-button" id="buildButton">Build Building</button>
    </div>
  </div>

  <!-- Building Selection Modal -->
  <div id="buildingModal" class="modal">
    <div class="modal-content">
      <span class="close" id="closeModal">&times;</span>
      <div class="modal-header">Select a Building</div>
      
      <div id="insufficientFunds" class="insufficient-funds">
        Insufficient funds for this building!
      </div>
      
      <div class="building-list" id="buildingList">
        <!-- Buildings will be populated here -->
      </div>
    </div>
  </div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>
    // Game State
    const gameState = {
      money: 200000,
      selectedBuilding: null
    };

    // Building Definitions
    const buildings = [
      { name: 'Small Police Station', cost: 50000, type: 'small-police' },
      { name: 'Police Station', cost: 100000, type: 'police' },
      { name: 'Small Fire Station', cost: 50000, type: 'small-fire' },
      { name: 'Fire Station', cost: 100000, type: 'fire' },
      { name: 'Small Ambulance Station', cost: 50000, type: 'small-ambulance' },
      { name: 'Ambulance Station', cost: 100000, type: 'ambulance' }
    ];

    // Update money display
    function updateMoneyDisplay() {
      const moneyDisplay = document.getElementById('moneyDisplay');
      moneyDisplay.textContent = '$' + gameState.money.toLocaleString();
    }

    // Create the map
    const map = L.map('map').setView([20, 0], 2);

    // Add OpenStreetMap tiles
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    // Build Button Click Handler
    document.getElementById('buildButton').addEventListener('click', function() {
      showBuildingModal();
    });

    // Show Building Selection Modal
    function showBuildingModal() {
      const modal = document.getElementById('buildingModal');
      const buildingList = document.getElementById('buildingList');
      const insufficientFunds = document.getElementById('insufficientFunds');
      
      buildingList.innerHTML = '';
      insufficientFunds.classList.remove('show');

      buildings.forEach(building => {
        const canAfford = gameState.money >= building.cost;
        const div = document.createElement('div');
        div.className = 'building-item' + (canAfford ? '' : ' unavailable');
        div.innerHTML = `
          <div class="building-name">${building.name}</div>
          <div class="building-cost">$${building.cost.toLocaleString()}</div>
        `;

        if (canAfford) {
          div.addEventListener('click', function() {
            selectBuilding(building);
          });
        } else {
          div.addEventListener('click', function() {
            insufficientFunds.classList.add('show');
          });
        }

        buildingList.appendChild(div);
      });

      modal.style.display = 'block';
    }

    // Select a Building
    function selectBuilding(building) {
      gameState.selectedBuilding = building;
      gameState.money -= building.cost;
      updateMoneyDisplay();

      // Close modal
      document.getElementById('buildingModal').style.display = 'none';

      // Notify user and wait for map click
      alert(`${building.name} selected! Click on the map to place it.`);
      map.once('click', function(e) {
        placeBuilding(building, e.latlng);
      });
    }

    // Place Building on Map
    function placeBuilding(building, latlng) {
      const colors = {
        'small-police': '#3b82f6',
        'police': '#1e40af',
        'small-fire': '#f97316',
        'fire': '#dc2626',
        'small-ambulance': '#06b6d4',
        'ambulance': '#0891b2'
      };

      const marker = L.circleMarker(latlng, {
        radius: 15,
        fillColor: colors[building.type],
        color: '#000',
        weight: 2,
        opacity: 0.8,
        fillOpacity: 0.7
      }).addTo(map);

      marker.bindPopup(`
        <b>${building.name}</b><br>
        Cost: $${building.cost.toLocaleString()}<br>
        Coordinates: ${latlng.lat.toFixed(2)}, ${latlng.lng.toFixed(2)}
      `);

      marker.openPopup();
    }

    // Modal Close Handler
    document.getElementById('closeModal').addEventListener('click', function() {
      document.getElementById('buildingModal').style.display = 'none';
    });

    // Close modal when clicking outside
    window.addEventListener('click', function(event) {
      const modal = document.getElementById('buildingModal');
      if (event.target == modal) {
        modal.style.display = 'none';
      }
    });

    // Initialize
    updateMoneyDisplay();
  </script>

</body>
</html>
